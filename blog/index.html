<style>
/* --- Colors & Base Styles --- */
:root{ --shu:#e6462d; --shu-tint:#fff2ef; --ink:#1f2937; --muted:#6b7280; --line:#e5e7eb; --card:#fff7f6; }
*{box-sizing:border-box}
body{ margin:0; background:#fff; color:var(--ink); font:16px/1.65 system-ui,-apple-system,sans-serif; text-align:center; }
.wrap{ max-width:1000px; margin:0 auto; padding:0 20px }
a{ color:inherit; text-decoration:none }

/* --- Site Header --- */
.site-header{ border-top:4px solid var(--shu); border-bottom:1px solid var(--line); background:#fff; padding:30px 0 }
.site-header-inner{ display:flex; flex-direction:column; align-items:center; gap:12px; position: relative; }
.logo-text{ font-weight:900; font-size:32px; color:var(--shu) }
.beta-text{ font-size:11px; font-weight:700; color:var(--muted); letter-spacing:1px; text-transform:uppercase; margin-top:-5px }
.nav-links, .sns-nav { display:flex; gap:15px; flex-wrap:wrap; justify-content:center; margin-top:5px }
.nav-links a { color:var(--ink); font-weight:700; text-decoration:none; font-size:14px; transition:0.2s }
.nav-links a:hover { color:var(--shu) }
.sns-nav a { color:var(--muted); font-size:18px; text-decoration:none; transition:0.2s }
.sns-nav a:hover { color:var(--shu) }

/* Language Toggle Button (Floating near header) */
.lang-toggle-btn{
  border:1px solid var(--line); border-radius:999px; padding:4px 12px; font-size:12px; 
  cursor:pointer; background:#fff; display:inline-flex; align-items:center; gap:6px;
  font-weight: 700; color: var(--muted); margin-top: 10px;
}

/* --- Hero Section --- */
.hero-section { background: var(--shu-tint); padding: 50px 0; border-radius: 0 0 40px 40px; }
.hero-section h1 { color: var(--shu); font-size: 32px; font-weight: 800; margin: 0 0 10px; }
.hero-section p { color: var(--muted); margin: 0; font-weight: 500; }

/* --- Blog Content --- */
.blog-main{ padding:50px 0; min-height:50vh; text-align: left; }

.searchbar{
  display:flex; align-items:center; gap:12px; background:#f9fafb; border:1px solid var(--line);
  padding:15px 20px; border-radius:12px; margin:-40px 0 40px; position:relative; z-index:10;
  box-shadow:0 4px 15px rgba(0,0,0,0.05);
}
.searchbar input{
  flex:1; height:40px; border:1px solid var(--line); border-radius:10px; padding:0 12px; font-size: 15px;
}
.search-links { font-size: 13px; display: flex; gap: 10px; }

/* Article Cards */
.list{ display:grid; gap:16px }
.card{ border:1px solid #f0d7d4; border-radius:15px; background:#fff7f6; overflow:hidden; transition: 0.2s; }
.card:hover{ transform: translateY(-2px); box-shadow: 0 4px 12px rgba(230,70,45,0.1); }
.card .head{ padding:15px 20px; border-bottom:1px dashed #f0d7d4; background:#fff; }
.card .date{ color:var(--muted); font-size:13px; font-weight: 600; margin-bottom: 4px; }
.card .title{ font-weight:800; font-size:20px; color: var(--ink); }
.card .title a:hover { color: var(--shu); }
.card .body{ padding:15px 20px }
.card .tags{ display:flex; gap:8px; flex-wrap:wrap; margin-top:10px; }
.card .tag{ font-size:12px; border:1px solid #f0d7d4; border-radius:999px; padding:3px 10px; background:#fff; font-weight: 600; color: var(--muted); }

/* --- Site Footer --- */
.site-footer{ border-top:1px solid var(--line); padding:50px 0; background:#fff; margin-top:80px; text-align: center; }
.footer-inner{ display:flex; flex-direction:column; align-items:center; gap:20px }
.footer-copy{ font-size:14px; color:var(--muted); font-weight:600 }
.footer-nav{ display:flex; gap:20px; flex-wrap:wrap; justify-content:center }
.footer-nav a{ color:var(--ink); text-decoration:none; font-size:14px; font-weight:700 }
.footer-nav a:hover{ color:var(--shu) }
.footer-icons{ display:flex; gap:15px }
.footer-icons a{ color:var(--muted); font-size:20px; transition:0.2s }
.footer-icons a:hover{ color:var(--shu) }

@media (min-width: 768px) {
  .site-header-inner { flex-direction: row; justify-content: space-between; }
  .footer-inner { flex-direction: column; align-items: center; }
}
</style>
</head>
<body>

<header class="site-header">
  <div class="wrap site-header-inner">
    <a href="/" style="text-decoration:none;display:flex;align-items:center;gap:2px;">
      <span class="logo-text">nihongotext</span><span style="font-weight:800;font-size:32px;color:#333;">.com</span>
    </a>
    <div class="beta-text">== beta version ==</div>
    <nav class="nav-links">
      <a href="/">Home</a>
      <a href="/content/dictionary.html">Vocabulary Tool</a>
      <a href="/quiz/index.html">Quiz</a>
      <a href="/blog/index.html" style="color:var(--shu);">Blog</a>
      <a href="/inquiry/index.html">Inquiry</a>
    </nav>
    <nav class="sns-nav">
      <a href="https://x.com/nihongotext_com" target="_blank" rel="noopener"><i class="fa-brands fa-x-twitter"></i></a>
      <a href="https://www.reddit.com/user/nihongotext_com/" target="_blank" rel="noopener"><i class="fa-brands fa-reddit-alien"></i></a>
      <a href="https://medium.com/@nihongotext.com" target="_blank" rel="noopener"><i class="fa-brands fa-medium"></i></a>
      <a href="https://ko-fi.com/nihongotext" target="_blank" rel="noopener"><i class="fa-solid fa-mug-hot"></i></a>
      <a href="https://substack.com/@nihongotextcom" target="_blank" rel="noopener"><i class="fa-solid fa-newspaper"></i></a>
    </nav>
  </div>
  <button id="langToggle" class="lang-toggle-btn">
    <i class="fa-solid fa-globe"></i> <span>日本語</span>
  </button>
</header>

<div class="hero-section">
  <div class="wrap">
    <h1 id="pageTitle">Blog</h1>
    <p id="subLead">Latest updates and news from nihongotext.com</p>
  </div>
</div>

<main class="wrap blog-main">
  <div class="searchbar">
    <i class="fa-solid fa-magnifying-glass" style="color:var(--muted)"></i>
    <input id="kw" type="text" placeholder="Search posts..." />
    <div class="search-links">
      <a href="/blog/index.html#all" style="color:var(--shu)"><i class="fa-solid fa-rotate"></i></a>
    </div>
  </div>

  <section id="list" class="list" aria-live="polite"></section>
</main>

<footer class="site-footer">
  <div class="wrap footer-inner">
    <div class="footer-copy">© <span id="ft-year"></span> nihongotext.com</div>
    <nav class="footer-nav">
      <a href="/">Home</a>
      <a href="/inquiry/index.html">Inquiry</a>
      <a href="/legal.html">Legal</a>
      <a href="/privacy.html">Privacy</a>
    </nav>
    <nav class="footer-icons">
      <a href="https://x.com/nihongotext_com" target="_blank" rel="noopener"><i class="fa-brands fa-x-twitter"></i></a>
      <a href="https://www.reddit.com/user/nihongotext_com/" target="_blank" rel="noopener"><i class="fa-brands fa-reddit-alien"></i></a>
      <a href="https://medium.com/@nihongotext.com" target="_blank" rel="noopener"><i class="fa-brands fa-medium"></i></a>
      <a href="https://ko-fi.com/nihongotext" target="_blank" rel="noopener"><i class="fa-solid fa-mug-hot"></i></a>
      <a href="https://substack.com/@nihongotextcom" target="_blank" rel="noopener"><i class="fa-solid fa-newspaper"></i></a>
    </nav>
  </div>
</footer>

<script>
/* ========= Language & UI Management ========= */
function getLang(){
  return localStorage.getItem('nt_lang') || localStorage.getItem('lang') || 
         ((navigator.language || 'en').startsWith('ja') ? 'ja' : 'en');
}

function setLang(lang){
  localStorage.setItem('nt_lang', lang);
  localStorage.setItem('lang', lang);
}

function applyUILang(lang){
  const kw = document.getElementById('kw');
  const sub = document.getElementById('subLead');
  const title = document.getElementById('pageTitle');
  const toggleLabel = document.querySelector('#langToggle span');

  if (kw) kw.placeholder = (lang === 'en') ? 'Search posts...' : '記事を検索...';
  if (sub) sub.textContent = (lang === 'en') ? 'Latest updates and news from nihongotext.com' : 'nihongotext.com からの最新更新情報';
  if (title) title.textContent = (lang === 'en') ? 'Blog' : 'ブログ';
  if (toggleLabel) toggleLabel.textContent = (lang === 'en') ? '日本語' : 'English';

  document.title = (lang === 'en') ? 'Blog | nihongotext.com' : 'ブログ | nihongotext.com';
  document.documentElement.lang = (lang === 'ja' ? 'ja' : 'en');
}

/* ========= Data Loading ========= */
const endpoints = ['/blog/posts.json', '/blog/news.json'];

async function loadPosts(){
  for (const url of endpoints){
    try{
      const r = await fetch(url, { cache:'no-store' });
      if (r.ok) {
        const data = await r.json();
        if (Array.isArray(data)) return data;
      }
    } catch(e){}
  }
  return [];
}

/* ========= Rendering ========= */
function render(posts){
  const list = document.getElementById('list');
  const lang = getLang();
  list.innerHTML = '';

  if (!posts.length){
    list.innerHTML = `<div style="text-align:center; padding:40px; color:var(--muted)">${(lang === 'en' ? 'No posts found.' : '記事が見つかりませんでした。')}</div>`;
    return;
  }

  posts
    .slice()
    .sort((a,b)=>(b.date || '').localeCompare(a.date || ''))
    .forEach(p=>{
      const card = document.createElement('article');
      card.className = 'card';

      const titleText = (lang === 'ja') ? (p.title_ja || p.title) : (p.title_en || p.title);
      const summaryText = (lang === 'ja') ? (p.summary_ja || p.summary_en) : (p.summary_en || p.summary_ja);

      card.innerHTML = `
        <div class="head">
          <div class="date"><i class="fa-regular fa-calendar-days"></i> ${p.date || ''}</div>
          <div class="title"><a href="/blog/${(p.slug || '').trim()}.html">${titleText}</a></div>
        </div>
        <div class="body">
          <div style="font-size:15px; line-height:1.6">${summaryText || ''}</div>
          <div class="tags">
            ${(p.tags || []).map(t => `<span class="tag">${t}</span>`).join('')}
          </div>
        </div>
      `;
      list.appendChild(card);
    });
}

/* ========= Initialization ========= */
document.addEventListener('DOMContentLoaded', async () => {
  const yearEl = document.getElementById('ft-year');
  if(yearEl) yearEl.textContent = new Date().getFullYear();

  const lang = getLang();
  applyUILang(lang);

  const posts = await loadPosts();
  window.__ALL_POSTS__ = posts;
  render(posts);

  // Search Logic
  document.getElementById('kw').addEventListener('input', (e) => {
    const term = e.target.value.toLowerCase().trim();
    if (!term) { render(window.__ALL_POSTS__); return; }
    const filtered = window.__ALL_POSTS__.filter(p => {
      const content = [p.title, p.title_en, p.title_ja, p.summary_en, p.summary_ja, ...(p.tags || [])].join(' ').toLowerCase();
      return content.includes(term);
    });
    render(filtered);
  });

  // Language Toggle Logic
  document.getElementById('langToggle').addEventListener('click', () => {
    const current = getLang();
    const next = (current === 'en') ? 'ja' : 'en';
    setLang(next);
    applyUILang(next);
    render(window.__ALL_POSTS__ || []);
  });
});
</script>
</body>
</html>
