<html lang="en">
<head>

<style>
/* --- Colors & Base Styles --- */
:root{ --shu:#e6462d; --shu-tint:#fff2ef; --ink:#1f2937; --muted:#6b7280; --line:#e5e7eb; --card:#fff7f6; }
*{box-sizing:border-box}
body{ margin:0; background:#fff; color:var(--ink); font:16px/1.65 system-ui,-apple-system,sans-serif; text-align:center; }
.wrap{ max-width:1000px; margin:0 auto; padding:0 20px }

/* --- Site Header (Centered Design Matched) --- */
.site-header{ border-top:4px solid var(--shu); border-bottom:1px solid var(--line); background:#fff; padding:30px 0 }
.site-header-inner{ display:flex; flex-direction:column; align-items:center; gap:12px }
.logo-link{ text-decoration:none; display:flex; align-items:center; gap:2px; }
.logo-text{ font-weight:900; font-size:32px; color:var(--shu) }
.beta-text{ font-size:11px; font-weight:700; color:var(--muted); letter-spacing:1px; text-transform:uppercase; margin-top:-5px }
.nav-links, .sns-nav { display:flex; gap:15px; flex-wrap:wrap; justify-content:center; margin-top:5px }
.nav-links a { color:var(--ink); font-weight:700; text-decoration:none; font-size:14px; transition:0.2s }
.nav-links a:hover { color:var(--shu) }
.sns-nav a { color:var(--muted); font-size:18px; text-decoration:none; transition:0.2s }
.sns-nav a:hover { color:var(--shu) }

.lang-toggle-btn{ border:1px solid var(--line); border-radius:999px; padding:4px 12px; font-size:12px; cursor:pointer; background:#fff; display:inline-flex; align-items:center; gap:6px; font-weight:700; color:var(--muted); margin-top:10px; }

/* --- Hero Section --- */
.hero-section { background: var(--shu-tint); padding: 50px 0; border-radius: 0 0 40px 40px; }
.hero-section h1 { color: var(--shu); font-size: 32px; font-weight: 800; margin: 0 0 10px; }
.hero-section p { color: var(--muted); margin: 0; font-weight: 500; }

/* --- Blog Content Styles --- */
.blog-main{ padding:50px 0; min-height:50vh; text-align: left; }
.search-box{ background:#f9fafb; border:1px solid var(--line); border-radius:12px; padding:20px; margin:-40px 0 40px; position:relative; z-index:10; box-shadow:0 4px 15px rgba(0,0,0,0.05); display: flex; align-items: center; gap: 10px; }
input#kw{ flex: 1; padding:12px; border:1px solid var(--line); border-radius:8px; font-size:16px; outline:none; background:#fff; }

.post-list{ display:grid; gap:20px }
.card{ border:1px solid #f0d7d4; border-radius:15px; background:var(--card); overflow:hidden; transition: 0.2s; }
.card:hover{ transform: translateY(-2px); box-shadow: 0 6px 15px rgba(230,70,45,0.08); }
.card .head{ padding:20px; border-bottom:1px dashed #f0d7d4; background:#fff; }
.card .date{ color:var(--muted); font-size:13px; font-weight: 700; margin-bottom: 4px; }
.card .title{ font-weight:800; font-size:20px; color: var(--ink); }
.card .title a { text-decoration: none; color: inherit; }
.card .title a:hover { color: var(--shu); }
.card .body{ padding:20px }
.card .tags{ display:flex; gap:8px; flex-wrap:wrap; margin-top:12px; }
.card .tag{ font-size:12px; border:1px solid #f0d7d4; border-radius:999px; padding:3px 12px; background:#fff; font-weight: 700; color: var(--muted); }

/* --- Site Footer (Centered Design Matched) --- */
.site-footer{ border-top:1px solid var(--line); padding:50px 0; background:#fff; margin-top:80px; text-align: center; }
.footer-inner{ display:flex; flex-direction:column; align-items:center; gap:20px }
.footer-copy{ font-size:14px; color:var(--muted); font-weight:600 }
.footer-nav{ display:flex; gap:20px; flex-wrap:wrap; justify-content:center }
.footer-nav a{ color:var(--ink); text-decoration:none; font-size:14px; font-weight:700 }
.footer-nav a:hover{ color:var(--shu) }
.footer-icons{ display:flex; gap:15px }
.footer-icons a{ color:var(--muted); font-size:20px; transition:0.2s }
.footer-icons a:hover{ color:var(--shu) }
</style>
</head>
<body>

<header class="site-header">
  <div class="wrap site-header-inner">
    <a href="/" class="logo-link">
      <span class="logo-text">nihongotext</span><span style="font-weight:800;font-size:32px;color:#333;">.com</span>
    </a>
    <div class="beta-text">== beta version ==</div>
    <nav class="nav-links">
      <a href="/">Home</a>
      <a href="/content/dictionary.html">Vocabulary Tool</a>
      <a href="/quiz/index.html">Quiz</a>
      <a href="/blog/index.html" style="color:var(--shu);">Blog</a>
      <a href="/inquiry/index.html">Inquiry</a>
    </nav>
    <nav class="sns-nav">
      <a href="https://x.com/nihongotext_com" target="_blank" rel="noopener"><i class="fa-brands fa-x-twitter"></i></a>
      <a href="https://www.reddit.com/user/nihongotext_com/" target="_blank" rel="noopener"><i class="fa-brands fa-reddit-alien"></i></a>
      <a href="https://medium.com/@nihongotext.com" target="_blank" rel="noopener"><i class="fa-brands fa-medium"></i></a>
      <a href="https://ko-fi.com/nihongotext" target="_blank" rel="noopener"><i class="fa-solid fa-mug-hot"></i></a>
      <a href="https://substack.com/@nihongotextcom" target="_blank" rel="noopener"><i class="fa-solid fa-newspaper"></i></a>
    </nav>
  </div>
  <button id="langToggle" class="lang-toggle-btn"><i class="fa-solid fa-globe"></i> <span>日本語</span></button>
</header>

<div class="hero-section">
  <div class="wrap">
    <h1 id="heroTitle">Blog</h1>
    <p id="heroSub">Latest news and articles about Japanese learning.</p>
  </div>
</div>

<main class="wrap blog-main">
  <div class="search-box">
    <i class="fa-solid fa-magnifying-glass" style="color:var(--muted)"></i>
    <input type="text" id="kw" placeholder="Search posts..." autocomplete="off">
  </div>
  
  <div id="list" class="post-list"></div>
</main>

<footer class="site-footer">
  <div class="wrap footer-inner">
    <div class="footer-copy">© <span id="ft-year"></span> nihongotext.com</div>
    <nav class="footer-nav">
      <a href="/">Home</a>
      <a href="/inquiry/index.html">Inquiry</a>
      <a href="/legal.html">Legal</a>
      <a href="/privacy.html">Privacy</a>
    </nav>
    <nav class="footer-icons">
      <a href="https://x.com/nihongotext_com" target="_blank" rel="noopener"><i class="fa-brands fa-x-twitter"></i></a>
      <a href="https://www.reddit.com/user/nihongotext_com/" target="_blank" rel="noopener"><i class="fa-brands fa-reddit-alien"></i></a>
      <a href="https://medium.com/@nihongotext.com" target="_blank" rel="noopener"><i class="fa-brands fa-medium"></i></a>
      <a href="https://ko-fi.com/nihongotext" target="_blank" rel="noopener"><i class="fa-solid fa-mug-hot"></i></a>
      <a href="https://substack.com/@nihongotextcom" target="_blank" rel="noopener"><i class="fa-solid fa-newspaper"></i></a>
    </nav>
  </div>
</footer>

<script>
let allPosts = [];
let currentLang = localStorage.getItem('nt_lang') || 'en';

async function initBlog() {
  document.getElementById('ft-year').textContent = new Date().getFullYear();
  applyUILang(currentLang);

  try {
    const res = await fetch('/blog/posts.json');
    if (res.ok) {
      allPosts = await res.json();
      renderPosts(allPosts);
    }
  } catch(e) {
    console.error("Failed to load posts.");
  }
}

function applyUILang(lang) {
  const isEn = (lang === 'en');
  document.getElementById('heroTitle').textContent = isEn ? "Blog" : "ブログ";
  document.getElementById('heroSub').textContent = isEn ? "Latest news and articles." : "最新のお知らせと記事";
  document.getElementById('kw').placeholder = isEn ? "Search posts..." : "記事を検索...";
  document.getElementById('langToggle').querySelector('span').textContent = isEn ? "日本語" : "English";
  document.documentElement.lang = lang;
}

function renderPosts(posts) {
  const listEl = document.getElementById('list');
  const lang = currentLang;
  listEl.innerHTML = posts.length ? '' : '<p style="text-align:center; padding:40px; color:var(--muted);">No posts found.</p>';

  posts.forEach(p => {
    const title = (lang === 'ja') ? (p.title_ja || p.title) : (p.title_en || p.title);
    const summary = (lang === 'ja') ? (p.summary_ja || p.summary_en) : (p.summary_en || p.summary_ja);
    
    const card = document.createElement('article');
    card.className = 'card';
    card.innerHTML = `
      <div class="head">
        <div class="date"><i class="fa-regular fa-calendar-days"></i> ${p.date || ''}</div>
        <div class="title"><a href="/blog/${p.slug}.html">${title}</a></div>
      </div>
      <div class="body">
        <div style="font-size:15px; color:#444;">${summary || ''}</div>
        <div class="tags">${(p.tags || []).map(t => `<span class="tag">${t}</span>`).join('')}</div>
      </div>
    `;
    listEl.appendChild(card);
  });
}

document.getElementById('langToggle').addEventListener('click', () => {
  currentLang = (currentLang === 'en' ? 'ja' : 'en');
  localStorage.setItem('nt_lang', currentLang);
  applyUILang(currentLang);
  renderPosts(allPosts);
});

document.getElementById('kw').addEventListener('input', (e) => {
  const term = e.target.value.toLowerCase().trim();
  const filtered = allPosts.filter(p => {
    const content = [p.title, p.title_en, p.title_ja, p.summary_en, p.summary_ja, ...(p.tags || [])].join(' ').toLowerCase();
    return content.includes(term);
  });
  renderPosts(filtered);
});

initBlog();
</script>
</body>
</html>
