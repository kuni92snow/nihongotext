<head>

<style>
/* --- Colors & Base Styles --- */
:root{ --shu:#e6462d; --shu-tint:#fff2ef; --ink:#1f2937; --muted:#6b7280; --line:#e5e7eb; --card:#fff7f6; }
*{box-sizing:border-box}
body{ margin:0; background:#fff; color:var(--ink); font:16px/1.65 system-ui,-apple-system,sans-serif; text-align:center; }
.wrap{ max-width:1000px; margin:0 auto; padding:0 20px }

/* --- Site Header (Matches index.html) --- */
.site-header{ border-top:4px solid var(--shu); border-bottom:1px solid var(--line); background:#fff; padding:30px 0 }
.site-header-inner{ display:flex; flex-direction:column; align-items:center; gap:12px }
.logo-text{ font-weight:900; font-size:32px; color:var(--shu); text-decoration:none; }
.beta-text{ font-size:11px; font-weight:700; color:var(--muted); letter-spacing:1px; text-transform:uppercase; margin-top:-5px }
.nav-links, .sns-nav { display:flex; gap:15px; flex-wrap:wrap; justify-content:center; margin-top:5px }
.nav-links a { color:var(--ink); font-weight:700; text-decoration:none; font-size:14px; transition:0.2s }
.nav-links a:hover { color:var(--shu) }
.sns-nav a { color:var(--muted); font-size:18px; text-decoration:none; transition:0.2s }
.sns-nav a:hover { color:var(--shu) }

/* --- Hero Section --- */
.hero-section { background: var(--shu-tint); padding: 50px 0; border-radius: 0 0 40px 40px; }
.hero-section h1 { color: var(--shu); font-size: 32px; font-weight: 800; margin: 0 0 10px; }
.hero-section p { color: var(--muted); margin: 0; font-weight: 500; }

/* --- Inquiry Form Styles --- */
.inquiry-main{ padding:50px 0; min-height:50vh; text-align: left; }
.form-card{ 
  background:#fff; border:1px solid var(--line); border-radius:15px; padding:30px; 
  margin:-40px auto 0; position:relative; z-index:10; box-shadow:0 4px 15px rgba(0,0,0,0.05);
  max-width: 600px;
}
label{ display:block; font-size:13px; font-weight:700; margin:15px 0 6px; color:var(--muted); text-transform:uppercase; }
input, textarea{
  width:100%; padding:14px; border:1px solid var(--line); border-radius:8px; 
  background:#fff; font:inherit; font-size: 15px; outline: none;
}
input:focus, textarea:focus{ border-color: var(--shu); }
textarea{ min-height:150px; resize:vertical; }

.btn-row{ display:flex; gap:12px; margin-top:20px; flex-wrap:wrap; justify-content:center; }
.btn{
  padding:14px 24px; border-radius:8px; background:var(--shu);
  color:#fff; border:none; cursor:pointer; font-weight:700; font-size:15px; transition: 0.2s;
}
.btn:hover{ opacity: 0.9; transform: translateY(-1px); }
.btn.secondary{ background:#fff; color:var(--ink); border:1px solid var(--line) }

.note{ font-size:12px; color:var(--muted); margin-top:15px; text-align: center; }
.msg-ok{ color:#10b981; font-weight:700; text-align: center; margin-top: 15px; }
.msg-ng{ color:#ef4444; font-weight:700; text-align: center; margin-top: 15px; }

/* --- Site Footer (Matches index.html) --- */
.site-footer{ border-top:1px solid var(--line); padding:50px 0; background:#fff; margin-top:80px; text-align: center; }
.footer-inner{ display:flex; flex-direction:column; align-items:center; gap:20px }
.footer-copy{ font-size:14px; color:var(--muted); font-weight:600 }
.footer-nav{ display:flex; gap:20px; flex-wrap:wrap; justify-content:center }
.footer-nav a{ color:var(--ink); text-decoration:none; font-size:14px; font-weight:700 }
.footer-nav a:hover{ color:var(--shu) }
.footer-icons{ display:flex; gap:15px }
.footer-icons a{ color:var(--muted); font-size:20px; transition:0.2s }
.footer-icons a:hover{ color:var(--shu) }

@media (min-width: 768px) {
  .site-header-inner { flex-direction: row; justify-content: space-between; }
  .footer-inner { flex-direction: column; align-items: center; }
}
</style>
</head>
<body>

<header class="site-header">
  <div class="wrap site-header-inner">
    <a href="/" style="text-decoration:none;display:flex;align-items:center;gap:2px;">
      <span class="logo-text">nihongotext</span><span style="font-weight:800;font-size:32px;color:#333;">.com</span>
    </a>
    <div class="beta-text">== beta version ==</div>
    <nav class="nav-links">
      <a href="/">Home</a>
      <a href="/content/dictionary.html">Vocabulary Tool</a>
      <a href="/quiz/index.html">Quiz</a>
      <a href="/blog/index.html">Blog</a>
      <a href="/inquiry/index.html" style="color:var(--shu);">Inquiry</a>
    </nav>
    <nav class="sns-nav">
      <a href="https://x.com/nihongotext_com" target="_blank" rel="noopener"><i class="fa-brands fa-x-twitter"></i></a>
      <a href="https://www.reddit.com/user/nihongotext_com/" target="_blank" rel="noopener"><i class="fa-brands fa-reddit-alien"></i></a>
      <a href="https://medium.com/@nihongotext.com" target="_blank" rel="noopener"><i class="fa-brands fa-medium"></i></a>
      <a href="https://ko-fi.com/nihongotext" target="_blank" rel="noopener"><i class="fa-solid fa-mug-hot"></i></a>
      <a href="https://substack.com/@nihongotextcom" target="_blank" rel="noopener"><i class="fa-solid fa-newspaper"></i></a>
    </nav>
  </div>
</header>

<div class="hero-section">
  <div class="wrap">
    <h1>Contact Us</h1>
    <p>Have a question or feedback? Send us a message.</p>
  </div>
</div>

<main class="wrap inquiry-main">
  <div class="form-card">
    <iframe name="submit_iframe" id="submit_iframe" style="display:none"></iframe>

    <form id="contactForm" target="submit_iframe" method="POST"
          action="https://script.google.com/macros/s/AKfycbwclbSxz7fRO9PQwLIpbhFGVzhocuSNBx2Y8ITm0LkuJU1HCZz38vQYmyOlC1kY9Nrzcg/exec">

      <label for="name">Name</label>
      <input id="name" name="name" autocomplete="name" placeholder="Your name" required />

      <label for="email">Email</label>
      <input id="email" name="email" type="email" autocomplete="email" placeholder="your@email.com" required />

      <label for="subject">Subject</label>
      <input id="subject" name="subject" placeholder="What is this about?" required />

      <label for="message">Message</label>
      <textarea id="message" name="message" placeholder="Write your message..." required></textarea>

      <input type="hidden" id="token" name="token" />

      <div class="row" style="margin-top: 20px; text-align: center; display: flex; flex-direction: column; align-items: center; gap: 15px;">
        <div class="g-recaptcha" data-sitekey="6LcRKvArAAAAAFVmY21y9o_hwTszHwzp3bgRXtBV"></div>
        
        <div class="btn-row">
          <button type="button" class="btn secondary" id="btnCancel">Cancel</button>
          <button type="submit" class="btn" id="btnSend">Send Message</button>
        </div>
      </div>

      <div class="note" id="rcNote">
        reCAPTCHA and Google’s
        <a href="https://policies.google.com/privacy?hl=en" target="_blank" rel="noopener">Privacy Policy</a> and
        <a href="https://policies.google.com/terms?hl=en" target="_blank" rel="noopener">Terms of Service</a> apply.
      </div>

      <div id="msg" aria-live="polite"></div>
    </form>
  </div>
</main>

<footer class="site-footer">
  <div class="wrap footer-inner">
    <div class="footer-copy">© <span id="ft-year"></span> nihongotext.com</div>
    <nav class="footer-nav">
      <a href="/">Home</a>
      <a href="/inquiry/index.html">Inquiry</a>
      <a href="/legal.html">Legal</a>
      <a href="/privacy.html">Privacy</a>
    </nav>
    <nav class="footer-icons">
      <a href="https://x.com/nihongotext_com" target="_blank" rel="noopener"><i class="fa-brands fa-x-twitter"></i></a>
      <a href="https://www.reddit.com/user/nihongotext_com/" target="_blank" rel="noopener"><i class="fa-brands fa-reddit-alien"></i></a>
      <a href="https://medium.com/@nihongotext.com" target="_blank" rel="noopener"><i class="fa-brands fa-medium"></i></a>
      <a href="https://ko-fi.com/nihongotext" target="_blank" rel="noopener"><i class="fa-solid fa-mug-hot"></i></a>
      <a href="https://substack.com/@nihongotextcom" target="_blank" rel="noopener"><i class="fa-solid fa-newspaper"></i></a>
    </nav>
  </div>
</footer>

<script>
// --- Initialize Page ---
document.addEventListener('DOMContentLoaded', () => {
  // Update Footer Year
  document.getElementById('ft-year').textContent = new Date().getFullYear();

  const form = document.getElementById('contactForm');
  const iframe = document.getElementById('submit_iframe');
  const msgEl = document.getElementById('msg');

  // Handle Form Submission Response
  iframe.addEventListener('load', () => {
    if (msgEl) {
      msgEl.innerHTML = "Your message has been sent. Thank you!";
      msgEl.className = 'msg-ok';
    }
    form.reset();
    if (window.grecaptcha) grecaptcha.reset();
  });

  // Handle Submit Button
  form.addEventListener('submit', (ev) => {
    const token = window.grecaptcha ? grecaptcha.getResponse() : '';
    if(!token){
      ev.preventDefault();
      if (msgEl) {
        msgEl.innerHTML = "Please check the reCAPTCHA box.";
        msgEl.className = 'msg-ng';
      }
      return;
    }
    document.getElementById('token').value = token;
  });

  // Handle Cancel Button
  document.getElementById('btnCancel').addEventListener('click', () => {
    form.reset();
    if (window.grecaptcha) grecaptcha.reset();
    if (msgEl) msgEl.innerHTML = '';
  });
});
</script>
</body>
</html>
