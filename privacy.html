<style>
:root{ --shu:#e6462d; --shu-tint:#fff2ef; --ink:#1f2937; --muted:#6b7280; --line:#e5e7eb; --card:#fff7f6; }
*{box-sizing:border-box}
body{ margin:0; background:#fff; color:var(--ink); font:16px/1.65 system-ui,-apple-system,sans-serif; text-align:center; }
.wrap{ max-width:1000px; margin:0 auto; padding:0 20px }

/* --- Site Header --- */
.site-header{ border-top:4px solid var(--shu); border-bottom:1px solid var(--line); background:#fff; padding:30px 0 }
.site-header-inner{ display:flex; flex-direction:column; align-items:center; gap:12px }
.logo-text{ font-weight:900; font-size:32px; color:var(--shu); text-decoration:none; }
.beta-text{ font-size:11px; font-weight:700; color:var(--muted); letter-spacing:1px; text-transform:uppercase; margin-top:-5px }
.nav-links, .sns-nav { display:flex; gap:15px; flex-wrap:wrap; justify-content:center; margin-top:5px }
.nav-links a { color:var(--ink); font-weight:700; text-decoration:none; font-size:14px; transition:0.2s }
.nav-links a:hover { color:var(--shu) }
.sns-nav a { color:var(--muted); font-size:18px; text-decoration:none; transition:0.2s }
.sns-nav a:hover { color:var(--shu) }

.lang-toggle-btn{ border:1px solid var(--line); border-radius:999px; padding:4px 12px; font-size:12px; cursor:pointer; background:#fff; display:inline-flex; align-items:center; gap:6px; font-weight:700; color:var(--muted); margin-top:10px; }

/* --- Hero Section --- */
.hero-section { background: var(--shu-tint); padding: 50px 0; border-radius: 0 0 40px 40px; }
.hero-section h1 { color: var(--shu); font-size: 28px; font-weight: 800; margin: 0 0 10px; line-height: 1.2; }
.hero-section p { color: var(--muted); margin: 0; font-weight: 500; }

/* --- Content --- */
.privacy-main{ padding:50px 0; min-height:50vh; text-align: left; }
.privacy-card{ background:#fff; border:1px solid var(--line); border-radius:15px; padding:35px; margin:-40px auto 0; position:relative; z-index:10; box-shadow:0 4px 15px rgba(0,0,0,0.05); max-width: 800px; }
.privacy-card h2{ color:var(--ink); font-size:18px; margin-top:25px; margin-bottom:10px; border-left:4px solid var(--shu); padding-left:12px; }
.privacy-card h2:first-of-type{ margin-top:0; }
.privacy-card p, .privacy-card li{ margin:10px 0; color:#444; font-size:15px; line-height:1.7; }
.privacy-card ul{ margin-left:20px; }

/* --- Site Footer --- */
.site-footer{ border-top:1px solid var(--line); padding:50px 0; background:#fff; margin-top:80px; text-align: center; }
.footer-inner{ display:flex; flex-direction:column; align-items:center; gap:20px }
.footer-copy{ font-size:14px; color:var(--muted); font-weight:600 }
.footer-nav{ display:flex; gap:20px; flex-wrap:wrap; justify-content:center }
.footer-nav a{ color:var(--ink); text-decoration:none; font-size:14px; font-weight:700 }
.footer-nav a:hover{ color:var(--shu) }
.footer-icons{ display:flex; gap:15px }
.footer-icons a{ color:var(--muted); font-size:20px; transition:0.2s }
.footer-icons a:hover{ color:var(--shu) }

@media (min-width: 768px) {
  .site-header-inner { flex-direction: row; justify-content: space-between; }
  .footer-inner { flex-direction: column; align-items: center; }
}
</style>
</head>
<body>

<header class="site-header">
  <div class="wrap site-header-inner">
    <a href="/" style="text-decoration:none;display:flex;align-items:center;gap:2px;">
      <span class="logo-text">nihongotext</span><span style="font-weight:800;font-size:32px;color:#333;">.com</span>
    </a>
    <div class="beta-text">== beta version ==</div>
    <nav class="nav-links">
      <a href="/">Home</a>
      <a href="/content/dictionary.html">Vocabulary Tool</a>
      <a href="/quiz/index.html">Quiz</a>
      <a href="/blog/index.html">Blog</a>
      <a href="/inquiry/index.html">Inquiry</a>
    </nav>
    <nav class="sns-nav">
      <a href="https://x.com/nihongotext_com" target="_blank" rel="noopener"><i class="fa-brands fa-x-twitter"></i></a>
      <a href="https://www.reddit.com/user/nihongotext_com/" target="_blank" rel="noopener"><i class="fa-brands fa-reddit-alien"></i></a>
      <a href="https://medium.com/@nihongotext.com" target="_blank" rel="noopener"><i class="fa-brands fa-medium"></i></a>
      <a href="https://ko-fi.com/nihongotext" target="_blank" rel="noopener"><i class="fa-solid fa-mug-hot"></i></a>
      <a href="https://substack.com/@nihongotextcom" target="_blank" rel="noopener"><i class="fa-solid fa-newspaper"></i></a>
    </nav>
  </div>
  <button id="langToggle" class="lang-toggle-btn"><i class="fa-solid fa-globe"></i> <span>日本語</span></button>
</header>

<div class="hero-section">
  <div class="wrap">
    <h1 id="heroTitle">Privacy Policy</h1>
    <p id="heroSub">How we handle your personal information</p>
  </div>
</div>

<main class="wrap privacy-main">
  <div class="privacy-card" id="privacyContent"></div>
</main>

<footer class="site-footer">
  <div class="wrap footer-inner">
    <div class="footer-copy">© <span id="ft-year"></span> nihongotext.com</div>
    <nav class="footer-nav">
      <a href="/">Home</a>
      <a href="/inquiry/index.html">Inquiry</a>
      <a href="/legal.html">Legal</a>
      <a href="/privacy.html" style="color:var(--shu);">Privacy</a>
    </nav>
    <nav class="footer-icons">
      <a href="https://x.com/nihongotext_com" target="_blank" rel="noopener"><i class="fa-brands fa-x-twitter"></i></a>
      <a href="https://www.reddit.com/user/nihongotext_com/" target="_blank" rel="noopener"><i class="fa-brands fa-reddit-alien"></i></a>
      <a href="https://medium.com/@nihongotext.com" target="_blank" rel="noopener"><i class="fa-brands fa-medium"></i></a>
      <a href="https://ko-fi.com/nihongotext" target="_blank" rel="noopener"><i class="fa-solid fa-mug-hot"></i></a>
      <a href="https://substack.com/@nihongotextcom" target="_blank" rel="noopener"><i class="fa-solid fa-newspaper"></i></a>
    </nav>
  </div>
</footer>

<script>
const privacyData = {
  en: { heroTitle: "Privacy Policy", heroSub: "How we handle your personal information", toggle: "日本語", html: `<h2>Scope</h2><p>This Privacy Policy explains how <strong>nihongotext.com</strong> handles personal information.</p><h2>Operator</h2><p><strong>nihongotext.com</strong></p><h2>Contact</h2><p>Email: <strong>info@nihongotext.com</strong></p><h2>Analytics</h2><p>We use <strong>Google Analytics</strong> and <strong>reCAPTCHA</strong> to improve our service and prevent spam.</p>` },
  ja: { heroTitle: "プライバシーポリシー", heroSub: "個人情報の取扱いについて", toggle: "English", html: `<h2>適用範囲</h2><p>本ポリシーは <strong>nihongotext.com</strong> における個人情報の扱いを定めます。</p><h2>運営者</h2><p><strong>nihongotext.com</strong></p><h2>お問い合わせ</h2><p>メール：<strong>info@nihongotext.com</strong></p><h2>ツール</h2><p>当サイトではサービス向上のため <strong>Google Analytics</strong> および <strong>reCAPTCHA</strong> を利用しています。</p>` }
};

let currentLang = localStorage.getItem('nt_lang') || 'en';
function applyLang(lang) {
  const d = privacyData[lang];
  document.getElementById('heroTitle').textContent = d.heroTitle;
  document.getElementById('heroSub').textContent = d.heroSub;
  document.getElementById('langToggle').querySelector('span').textContent = d.toggle;
  document.getElementById('privacyContent').innerHTML = d.html;
  document.documentElement.lang = lang;
  localStorage.setItem('nt_lang', lang);
}

document.getElementById('langToggle').addEventListener('click', () => {
  currentLang = currentLang === 'en' ? 'ja' : 'en';
  applyLang(currentLang);
});

document.addEventListener('DOMContentLoaded', () => {
  document.getElementById('ft-year').textContent = new Date().getFullYear();
  applyLang(currentLang);
});
</script>
</body>
