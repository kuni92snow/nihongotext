<style>
/* --- Colors & Base Styles --- */
:root{ --shu:#e6462d; --shu-tint:#fff2ef; --ink:#1f2937; --muted:#6b7280; --line:#e5e7eb; --card:#fff7f6; }
*{box-sizing:border-box}
body{ margin:0; background:#fff; color:var(--ink); font:16px/1.65 system-ui,-apple-system,sans-serif; text-align:center; }
.wrap{ max-width:1000px; margin:0 auto; padding:0 20px }

/* --- Site Header (Centered Design Matched) --- */
.site-header{ border-top:4px solid var(--shu); border-bottom:1px solid var(--line); background:#fff; padding:30px 0 }
.site-header-inner{ display:flex; flex-direction:column; align-items:center; gap:12px }
.logo-link{ text-decoration:none; display:flex; align-items:center; gap:2px; }
.logo-text{ font-weight:900; font-size:32px; color:var(--shu) }
.beta-text{ font-size:11px; font-weight:700; color:var(--muted); letter-spacing:1px; text-transform:uppercase; margin-top:-5px }
.nav-links, .sns-nav { display:flex; gap:15px; flex-wrap:wrap; justify-content:center; margin-top:5px }
.nav-links a { color:var(--ink); font-weight:700; text-decoration:none; font-size:14px; transition:0.2s }
.nav-links a:hover { color:var(--shu) }
.sns-nav a { color:var(--muted); font-size:18px; text-decoration:none; transition:0.2s }
.sns-nav a:hover { color:var(--shu) }

/* --- Hero Section --- */
.hero-section { background: var(--shu-tint); padding: 50px 0; border-radius: 0 0 40px 40px; }
.hero-section h1 { color: var(--shu); font-size: 32px; font-weight: 800; margin: 0 0 10px; }
.hero-section p { color: var(--muted); margin: 0; font-weight: 500; }

/* --- Quiz UI Styles (Aligned Center/Left) --- */
.quiz-main { padding: 50px 0; min-height: 50vh; text-align: left; }
.quiz-container { max-width: 600px; margin: -40px auto 0; position: relative; z-index: 10; }

#setupView, .q-card, #resultView { 
  background: #fff; border: 1px solid var(--line); padding: 35px; border-radius: 15px; 
  box-shadow: 0 4px 15px rgba(0,0,0,0.05); text-align: center;
}

.form-group { margin-bottom: 20px; text-align: left; }
label { display: block; font-size: 13px; font-weight: 700; margin-bottom: 8px; color: var(--muted); text-transform: uppercase; }
select { width: 100%; padding: 12px; border: 1px solid var(--line); border-radius: 8px; font-size: 16px; background: #fff; }

.btn {
  background: var(--shu); color: #fff; border: none; padding: 16px; 
  border-radius: 8px; font-size: 16px; font-weight: 700; cursor: pointer; width: 100%; transition: 0.2s;
}
.btn:hover { opacity: 0.9; transform: translateY(-1px); }

.options { display: grid; gap: 12px; margin-top: 20px; }
.opt-btn {
  background: #fff; border: 1px solid var(--line); padding: 15px; border-radius: 8px;
  text-align: left; font-size: 16px; font-weight: 600; cursor: pointer; transition: 0.2s;
}
.opt-btn:hover { border-color: var(--shu); background: var(--shu-tint); }
.opt-btn.correct { background: #d1fae5; border-color: #10b981; color: #065f46; }
.opt-btn.wrong { background: #fee2e2; border-color: #ef4444; color: #991b1b; }

/* --- Site Footer (Centered Design Matched) --- */
.site-footer{ border-top:1px solid var(--line); padding:50px 0; background:#fff; margin-top:80px; text-align: center; }
.footer-inner{ display:flex; flex-direction:column; align-items:center; gap:20px }
.footer-copy{ font-size:14px; color:var(--muted); font-weight:600 }
.footer-nav{ display:flex; gap:20px; flex-wrap:wrap; justify-content:center }
.footer-nav a{ color:var(--ink); text-decoration:none; font-size:14px; font-weight:700 }
.footer-nav a:hover{ color:var(--shu) }
.footer-icons{ display:flex; gap:15px }
.footer-icons a{ color:var(--muted); font-size:20px; transition:0.2s }
.footer-icons a:hover{ color:var(--shu) }
</style>

<body>

<header class="site-header">
  <div class="wrap site-header-inner">
    <a href="/" class="logo-link">
      <span class="logo-text">nihongotext</span><span style="font-weight:800;font-size:32px;color:#333;">.com</span>
    </a>
    <div class="beta-text">== beta version ==</div>
    <nav class="nav-links">
      <a href="/">Home</a>
      <a href="/content/dictionary.html">Vocabulary Tool</a>
      <a href="/quiz/index.html" style="color:var(--shu);">Quiz</a>
      <a href="/blog/index.html">Blog</a>
      <a href="/inquiry/index.html">Inquiry</a>
    </nav>
    <nav class="sns-nav">
      <a href="https://x.com/nihongotext_com" target="_blank" rel="noopener"><i class="fa-brands fa-x-twitter"></i></a>
      <a href="https://www.reddit.com/user/nihongotext_com/" target="_blank" rel="noopener"><i class="fa-brands fa-reddit-alien"></i></a>
      <a href="https://medium.com/@nihongotext.com" target="_blank" rel="noopener"><i class="fa-brands fa-medium"></i></a>
      <a href="https://ko-fi.com/nihongotext" target="_blank" rel="noopener"><i class="fa-solid fa-mug-hot"></i></a>
      <a href="https://substack.com/@nihongotextcom" target="_blank" rel="noopener"><i class="fa-solid fa-newspaper"></i></a>
    </nav>
  </div>
</header>

<div class="hero-section">
  <div class="wrap">
    <h1>Vocabulary Quiz</h1>
    <p>Test your Japanese skills by JLPT level and category.</p>
  </div>
</div>

<main class="wrap quiz-main">
  <div class="quiz-container">
    <div id="setupView">
      <div class="form-group">
        <label>JLPT Level</label>
        <select id="lv">
          <option value="n5">N5 (Beginner)</option>
          <option value="n4">N4</option>
          <option value="n3">N3</option>
          <option value="n2">N2</option>
          <option value="n1">N1 (Advanced)</option>
        </select>
      </div>
      <div class="form-group">
        <label>Category</label>
        <select id="cat">
          <option value="noun">Noun (名詞)</option>
          <option value="verb">Verb (動詞)</option>
          <option value="adjective-i">Adj-i (い形容詞)</option>
          <option value="adjective-na">Adj-na (な形容詞)</option>
        </select>
      </div>
      <button class="btn" onclick="startQuiz()">Start Quiz</button>
    </div>

    <div id="quizView" style="display:none">
      <div id="qCard" class="q-card">
        <div id="progress" style="font-size:14px; color:var(--muted); margin-bottom:10px; font-weight:700;"></div>
        <div id="qText" style="font-size:24px; font-weight:800; margin-bottom:15px;"></div>
        <div id="options" class="options"></div>
        <button id="nextBtn" class="btn" style="display:none; margin-top:20px;" onclick="nextQuestion()">Next Question</button>
      </div>
    </div>

    <div id="resultView" style="display:none">
      <h2 id="scoreText">Quiz Complete!</h2>
      <p id="scoreSub"></p>
      <button class="btn" onclick="location.reload()">Try Again</button>
    </div>
  </div>
</main>

<footer class="site-footer">
  <div class="wrap footer-inner">
    <div class="footer-copy">© <span id="ft-year"></span> nihongotext.com</div>
    <nav class="footer-nav">

      <a href="/inquiry/index.html">Inquiry</a>
      <a href="/legal.html">Legal</a>
      <a href="/privacy.html">Privacy</a>
    </nav>
    <nav class="footer-icons">
      <a href="https://x.com/nihongotext_com" target="_blank" rel="noopener"><i class="fa-brands fa-x-twitter"></i></a>
      <a href="https://www.reddit.com/user/nihongotext_com/" target="_blank" rel="noopener"><i class="fa-brands fa-reddit-alien"></i></a>
      <a href="https://medium.com/@nihongotext.com" target="_blank" rel="noopener"><i class="fa-brands fa-medium"></i></a>
      <a href="https://ko-fi.com/nihongotext" target="_blank" rel="noopener"><i class="fa-solid fa-mug-hot"></i></a>
      <a href="https://substack.com/@nihongotextcom" target="_blank" rel="noopener"><i class="fa-solid fa-newspaper"></i></a>
    </nav>
  </div>
</footer>

<script>
let questions = [];
let currentIdx = 0;
let score = 0;

async function startQuiz() {
  const lv = document.getElementById('lv').value;
  const cat = document.getElementById('cat').value;
  
  try {
    const res = await fetch(`/data/json/${lv}_master_cleaned.json`);
    const data = await res.json();
    const filtered = data.filter(item => item.pos === cat);
    
    if (filtered.length < 4) {
      alert("Not enough words in this category. Try another level!");
      return;
    }

    questions = filtered.sort(() => 0.5 - Math.random()).slice(0, 5).map(item => {
      const others = filtered.filter(f => f.ja !== item.ja).sort(() => 0.5 - Math.random()).slice(0, 3);
      return {
        ja: item.ja,
        kana: item.kana,
        en: item.en,
        options: [...others, item].sort(() => 0.5 - Math.random())
      };
    });

    document.getElementById('setupView').style.display = 'none';
    document.getElementById('quizView').style.display = 'block';
    renderQuestion();
  } catch(e) { alert("Error loading quiz data."); }
}

function renderQuestion() {
  const q = questions[currentIdx];
  document.getElementById('progress').innerText = `Question ${currentIdx + 1} / 5`;
  document.getElementById('qText').innerText = q.ja;
  document.getElementById('nextBtn').style.display = 'none';
  
  const optBox = document.getElementById('options');
  optBox.innerHTML = '';
  
  q.options.forEach(opt => {
    const btn = document.createElement('button');
    btn.className = 'opt-btn';
    btn.innerText = opt.en;
    btn.onclick = () => {
      const btns = optBox.querySelectorAll('.opt-btn');
      btns.forEach(b => b.disabled = true);
      if (opt.ja === q.ja) {
        btn.classList.add('correct');
        score++;
      } else {
        btn.classList.add('wrong');
        btns.forEach(b => { if(b.innerText === q.en) b.classList.add('correct'); });
      }
      document.getElementById('nextBtn').style.display = 'block';
    };
    optBox.appendChild(btn);
  });
}

function nextQuestion() {
  currentIdx++;
  if (currentIdx < 5) renderQuestion();
  else showResult();
}

function showResult() {
  document.getElementById('quizView').style.display = 'none';
  document.getElementById('resultView').style.display = 'block';
  document.getElementById('scoreSub').innerText = `You scored ${score} out of 5!`;
}

document.addEventListener('DOMContentLoaded', () => {
  document.getElementById('ft-year').textContent = new Date().getFullYear();
});
</script>
</body>
