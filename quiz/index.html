<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>Quiz - nihongotext.com</title>
<link rel="icon" href="/favicon.ico" />
<link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet">

<script async src="https://www.googletagmanager.com/gtag/js?id=G-9QSHWJE0HZ"></script>

  function gtag(){ dataLayer.push(arguments); }

<style>
/* --- self-intro (1).html 共通スタイル --- */
:root{ --shu:#e6462d; --shu-tint:#fff2ef; --ink:#1f2937; --muted:#6b7280; --line:#e5e7eb; --card:#fff7f6; }
*{box-sizing:border-box}
html,body{ margin:0;background:#fff;color:var(--ink); font:16px/1.65 system-ui,-apple-system,sans-serif }
.wrap{max-width:800px;margin:0 auto;padding:0 16px}

/* Header & Footer (self-intro.html と完全一致) */
.topbar{border-top:4px solid var(--shu);border-bottom:1px solid var(--shu-tint);background:#fff;padding:20px 0}
.brand{font-weight:900;font-size:32px;color:var(--shu);text-align:center;display:block;text-decoration:none}
nav{display:flex;justify-content:center;gap:15px;margin-top:10px;flex-wrap:wrap}
nav a{color:var(--ink);font-weight:600;font-size:14px;text-decoration:none}
nav a:hover{color:var(--shu)}
.footer{border-top:1px solid var(--shu-tint);padding:20px 0;text-align:center;color:var(--muted);font-size:12px}

/* Quiz UI */
.quiz-container{ max-width:600px; margin:0 auto; padding:40px 16px }
#setupView{ background:#f9fafb; border:1px solid var(--line); padding:30px; border-radius:12px; text-align:center }
.form-group{ margin-bottom:20px; text-align:left }
label{ display:block; font-size:13px; font-weight:700; margin-bottom:8px; color:var(--muted) }
select{ width:100%; padding:12px; border:1px solid var(--line); border-radius:8px; font-size:16px; background:#fff }

.btn{
  background:var(--shu); color:#fff; border:none; padding:16px; 
  border-radius:8px; font-size:16px; font-weight:700; cursor:pointer; width:100%;
}
.btn:hover{ opacity: 0.9; }
.btn:disabled{ opacity:0.5; cursor:not-allowed }

#quizView{ display:none }
.progress{ font-size:14px; color:var(--muted); margin-bottom:15px; text-align:center }
.q-card{ background:var(--card); border:1px solid #ffe4e1; padding:30px; border-radius:12px; margin-bottom:20px }
.q-text{ font-size:20px; font-weight:800; line-height:1.5; margin-bottom:15px; text-align:center }
.q-hint{ font-size:15px; color:var(--muted); text-align:center; margin-bottom:15px }

.options{ display:grid; gap:12px }
.opt-btn{
  background:#fff; border:1px solid var(--line); padding:15px; border-radius:8px;
  text-align:left; font-size:16px; font-weight:600; cursor:pointer; transition:0.2s;
}
.opt-btn:hover{ border-color:var(--shu); background:var(--shu-tint) }
.opt-btn.correct{ background:#d1fae5; border-color:#10b981; color:#065f46 }
.opt-btn.wrong{ background:#fee2e2; border-color:#ef4444; color:#991b1b }

.display-mode{ margin-top:20px; display:flex; justify-content:center; gap:15px; flex-wrap:wrap }
.radio-label{ font-size:12px; color:var(--muted); cursor:pointer; display:flex; align-items:center; gap:4px }

#resultView{ display:none; text-align:center; padding:20px 0 }
.score-circle{ width:100px; height:100px; border-radius:50%; background:var(--shu); color:#fff; display:flex; flex-direction:column; justify-content:center; align-items:center; margin:0 auto 20px }
.score-circle .num{ font-size:28px; font-weight:900 }

.res-table{ width:100%; border-collapse:collapse; margin-top:30px; text-align:left; font-size:14px }
.res-table td{ padding:12px; border-bottom:1px solid var(--line) }
.res-status{ width:30px; font-weight:bold; text-align:center }
.res-correct{ color:#10b981 }
.res-wrong{ color:#ef4444 }

/* SNS Buttons */
.sns-group{ display: flex; flex-direction: column; gap: 10px; margin-top: 30px; }
.sns-btn{ display: flex; align-items: center; justify-content: center; gap: 8px; text-decoration: none; }
.btn-x{ background:#1f2937 } 
.btn-reddit{ background:#ff4500 }
.btn-email{ background:var(--muted) }
#nextBtn{ margin-top:20px; display:none }
</style>
</head>

<body>

<div class="topbar">
  <div class="wrap">
    <a href="/" class="brand">nihongotext<span style="color:var(--ink)">.com</span></a>
    <nav>
      <a href="/" style="font-weight:bold;">Home</a>
      <a href="/dictionary.html">Vocabulary Tool</a>
      <a href="/blog/index.html">Blog</a>
      <a href="/inquiry/index.html">Inquiry</a>
    </nav>
  </div>
</div>

<main class="wrap">
  <div class="quiz-container">
    <h2 style="text-align:center; margin-bottom:30px">Japanese Vocabulary Quiz</h2>

    <div id="setupView">
      <div class="form-group">
        <label>JLPT Level</label>
        <select id="lv">
          <option value="n5">N5 (Beginner)</option>
          <option value="n4">N4</option>
          <option value="n3">N3</option>
          <option value="n2">N2</option>
          <option value="n1">N1 (Advanced)</option>
        </select>
      </div>
      <div class="form-group">
        <label>Category</label>
        <select id="cat">
          <option value="noun">Noun (名詞)</option>
          <option value="verb">Verb (動詞)</option>
          <option value="adjective-i">Adj-i (い形容詞)</option>
          <option value="adjective-na">Adj-na (な形容詞)</option>
          <option value="adverb">Adverb (副詞)</option>
          <option value="expression">Grammar (文法/表現)</option>
        </select>
      </div>
      <div class="form-group">
        <label>Number of Questions</label>
        <select id="qCount">
          <option value="3">3 Questions</option>
          <option value="5" selected>5 Questions</option>
          <option value="10">10 Questions</option>
        </select>
      </div>
      <button class="btn" id="startBtn" onclick="startQuiz()">Start Quiz</button>
    </div>

    <div id="quizView">
      <div class="progress" id="progress">Question 1 / 5</div>
      <div class="q-card">
        <div class="q-text" id="qText"></div>
        <div class="q-hint" id="qHint"></div>
        <div class="options" id="options"></div>
      </div>
      <button class="btn" id="nextBtn" onclick="handleNext()">Next Question</button>

      <div class="display-mode" id="displayModeGroup">
        <label class="radio-label"><input type="radio" name="mode" value="kanji" checked onchange="refreshQuestion()"> Kanji</label>
        <label class="radio-label"><input type="radio" name="mode" value="kana" onchange="refreshQuestion()"> Kana</label>
        <label class="radio-label"><input type="radio" name="mode" value="both" onchange="refreshQuestion()"> Both (漢字・かな)</label>
      </div>
    </div>

    <div id="resultView">
      <div class="score-circle">
        <div class="num" id="scoreNum">0</div>
        <div style="font-size:12px">Score</div>
      </div>
      <h3>Quiz Results</h3>
      <table class="res-table">
        <tbody id="resList"></tbody>
      </table>
      
      <div class="sns-group">
        <button class="btn btn-x" id="shareX"><i class="fa-brands fa-x-twitter"></i> Share on X</button>
        <button class="btn btn-reddit" id="shareReddit"><i class="fa-brands fa-reddit-alien"></i> Post to Reddit</button>
        <button class="btn btn-email" id="shareEmail"><i class="fa-solid fa-envelope"></i> Email Results</button>
        <button class="btn" onclick="location.reload()" style="background:var(--ink); margin-top:10px">Try Again</button>
      </div>
    </div>
  </div>
</main>

<footer class="footer">
  <div class="wrap">© 2026 nihongotext.com</div>
</footer>

<script>
let quizItems = [];
let currentIndex = 0;
let score = 0;

async function startQuiz() {
  const lv = document.getElementById('lv').value;
  const cat = document.getElementById('cat').value;
  const count = parseInt(document.getElementById('qCount').value);
  const btn = document.getElementById('startBtn');
  
  btn.disabled = true;
  btn.innerText = "Loading...";

  try {
    const res = await fetch(`/data/json/${lv}_master_cleaned.json`);
    if(!res.ok) throw new Error("File not found");
    const data = await res.json();
    
    const filtered = data.filter(item => item.pos === cat);
    if (filtered.length < 4) {
      alert("Not enough words in this category. Try another!");
      location.reload();
      return;
    }

    const shuffled = filtered.sort(() => 0.5 - Math.random());
    quizItems = shuffled.slice(0, count).map(item => {
      let qText = item.ja;
      let qHint = item.en;
      
      if (item.examples && item.examples.length > 0) {
        const ex = item.examples[Math.floor(Math.random() * item.examples.length)];
        qText = ex.ja.includes(item.ja) ? ex.ja.replace(item.ja, "【 ___ 】") : item.ja;
        qHint = ex.en;
      }

      const others = filtered.filter(f => f.ja !== item.ja).sort(() => 0.5 - Math.random()).slice(0, 3);
      const options = [...others, item].sort(() => 0.5 - Math.random());

      return { item, qText, qHint, options, answer: item.ja, userCorrect: false };
    });

    document.getElementById('setupView').style.display = 'none';
    document.getElementById('quizView').style.display = 'block';
    renderQuestion();

  } catch (err) {
    console.error(err);
    alert("Error loading data. Check /data/json/ folder.");
    location.reload();
  }
}

function renderQuestion() {
  const q = quizItems[currentIndex];
  const mode = document.querySelector('input[name="mode"]:checked').value;
  
  document.getElementById('nextBtn').style.display = 'none';
  document.getElementById('progress').innerText = `Question ${currentIndex + 1} / ${quizItems.length}`;
  document.getElementById('qText').innerText = q.qText;
  document.getElementById('qHint').innerText = q.qHint;
  
  const optBox = document.getElementById('options');
  optBox.innerHTML = '';

  q.options.forEach(opt => {
    const btn = document.createElement('button');
    btn.className = 'opt-btn';
    
    if (mode === 'kana') {
      btn.innerText = opt.kana || opt.ja;
    } else if (mode === 'both') {
      btn.innerHTML = `${opt.ja} <span style="font-size:0.8em; color:var(--muted); font-weight:normal;">(${opt.kana || opt.ja})</span>`;
    } else {
      btn.innerText = opt.ja;
    }
    
    btn.onclick = () => {
      const btns = optBox.querySelectorAll('.opt-btn');
      btns.forEach(b => b.disabled = true);
      
      if (opt.ja === q.answer) {
        btn.classList.add('correct');
        score++;
        q.userCorrect = true;
      } else {
        btn.classList.add('wrong');
        btns.forEach(b => {
          if (b.innerText.startsWith(q.answer)) b.classList.add('correct');
        });
      }
      document.getElementById('nextBtn').style.display = 'block';
    };
    optBox.appendChild(btn);
  });
}

function refreshQuestion() { if (quizItems.length > 0) renderQuestion(); }

function handleNext() {
  currentIndex++;
  if (currentIndex < quizItems.length) renderQuestion();
  else showResults();
}

function showResults() {
  document.getElementById('quizView').style.display = 'none';
  document.getElementById('resultView').style.display = 'block';
  document.getElementById('scoreNum').innerText = `${score}/${quizItems.length}`;

  const list = document.getElementById('resList');
  let summaryText = `I scored ${score}/${quizItems.length} on the nihongotext.com Japanese Quiz!`;

  quizItems.forEach((q, i) => {
    const row = document.createElement('tr');
    const isOk = q.userCorrect;
    row.innerHTML = `<td class="res-status ${isOk ? 'res-correct' : 'res-wrong'}">${isOk ? '✓' : '✗'}</td>
      <td><strong>${q.item.ja}</strong> (${q.item.kana})<br><span style="font-size:12px; color:var(--muted)">${q.item.en}</span></td>`;
    list.appendChild(row);
  });

  // X (Twitter) Share
  document.getElementById('shareX').onclick = () => {
    const text = encodeURIComponent(summaryText + "\nTry it here: ");
    const url = encodeURIComponent(window.location.href);
    window.open(`https://twitter.com/intent/tweet?text=${text}&url=${url}`, '_blank');
  };

  // Reddit Post
  document.getElementById('shareReddit').onclick = () => {
    const title = encodeURIComponent(summaryText);
    const url = encodeURIComponent(window.location.href);
    window.open(`https://www.reddit.com/submit?title=${title}&url=${url}`, '_blank');
  };

  // Email
  document.getElementById('shareEmail').onclick = () => {
    const subject = encodeURIComponent("My Japanese Quiz Results");
    const body = encodeURIComponent(summaryText + "\nCheck out the materials at nihongotext.com");
    window.location.href = `mailto:?subject=${subject}&body=${body}`;
  };
}
</script>
</body>
</html>
