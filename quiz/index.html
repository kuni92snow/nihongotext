<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>Advanced Vocabulary Quiz - nihongotext.com</title>
<link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet">

<style>
:root{ --shu:#e6462d; --shu-tint:#fff2ef; --ink:#1f2937; --muted:#6b7280; --line:#e5e7eb; --card:#fff7f6; }
*{box-sizing:border-box}
body{ margin:0; background:#fff; color:var(--ink); font:16px/1.65 system-ui,-apple-system,sans-serif; text-align:center; }
.wrap{ max-width:1000px; margin:0 auto; padding:0 20px }

/* --- Header & Footer SNS Styles --- */
.site-header{ border-top:4px solid var(--shu); border-bottom:1px solid var(--line); background:#fff; padding:30px 0 }
.site-header-inner{ display:flex; flex-direction:column; align-items:center; gap:12px }
.logo-link{ text-decoration:none; display:flex; align-items:center; gap:2px; }
.logo-text{ font-weight:900; font-size:32px; color:var(--shu) }
.nav-links, .sns-nav { display:flex; gap:15px; flex-wrap:wrap; justify-content:center; margin-top:5px }
.nav-links a { color:var(--ink); font-weight:700; text-decoration:none; font-size:14px; transition:0.2s }
.nav-links a:hover { color:var(--shu) }
.sns-nav a { color:var(--muted); font-size:18px; text-decoration:none; transition:0.2s }
.sns-nav a:hover { color:var(--shu) }

.hero-section { background: var(--shu-tint); padding: 50px 0; border-radius: 0 0 40px 40px; }
.hero-section h1 { color: var(--shu); font-size: 32px; font-weight: 800; margin: 0 0 10px; }

.quiz-main { padding: 50px 0; min-height: 50vh; text-align: left; }
.quiz-container { max-width: 600px; margin: -40px auto 0; position: relative; z-index: 10; }
#setupView, .q-card, #resultView { background: #fff; border: 1px solid var(--line); padding: 35px; border-radius: 15px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); text-align: center; }

.remaining-setup { font-weight: 800; font-size: 15px; color: var(--ink); margin-bottom: 15px; text-align: center; }
.form-group { margin-bottom: 20px; text-align: left; }
label { display: block; font-size: 13px; font-weight: 700; margin-bottom: 8px; color: var(--muted); text-transform: uppercase; }
select { width: 100%; padding: 12px; border: 1px solid var(--line); border-radius: 8px; font-size: 16px; }

.btn { background: var(--shu); color: #fff; border: none; padding: 14px; border-radius: 8px; font-size: 16px; font-weight: 700; cursor: pointer; width: 100%; display: flex; align-items: center; justify-content: center; gap: 8px; text-decoration: none; transition: 0.2s; }
.btn:hover { opacity: 0.9; }
.opt-btn { width:100%; margin-top:10px; background: #fff; border: 1px solid var(--line); padding: 15px; border-radius: 8px; text-align: left; cursor: pointer; font-weight: 600; }
.opt-btn.correct { background: #d1fae5; border-color: #10b981; }
.opt-btn.wrong { background: #fee2e2; border-color: #ef4444; }

.small-sns-row { display: flex; justify-content: center; gap: 10px; margin-top: 15px; }
.btn-small { padding: 8px 12px; border-radius: 6px; font-size: 13px; font-weight: 700; text-decoration: none; color: #fff; display: inline-flex; align-items: center; gap: 5px; }
.btn-x { background: #000; }
.btn-reddit { background: #ff4500; }

.site-footer{ border-top:1px solid var(--line); padding:50px 0; background:#fff; margin-top:80px; text-align: center; }
.footer-inner{ display:flex; flex-direction:column; align-items:center; gap:20px }
.footer-copy{ font-size:14px; color:var(--muted); font-weight:600 }

@media print { body > *:not(#printArea) { display: none !important; } #printArea { display: block !important; position: static; width: 100%; text-align: left; } }
</style>
</head>
<body>

<header class="site-header">
  <div class="wrap site-header-inner">
    <a href="/" class="logo-link"><span class="logo-text">nihongotext</span><span style="color:#333;">.com</span></a>
    <div style="font-size:11px; font-weight:700; color:var(--muted); letter-spacing:1px; text-transform:uppercase; margin-top:-5px">== beta version ==</div>
    <nav class="nav-links">
      <a href="/">Home</a>
      <a href="/content/dictionary.html">Vocabulary</a>
      <a href="/quiz/index.html" style="color:var(--shu);">Quiz</a>
      <a href="/blog/index.html">Blog</a>
      <a href="/inquiry/index.html">Inquiry</a>
    </nav>
    <nav class="sns-nav">
      <a href="https://x.com/nihongotext_com" target="_blank"><i class="fa-brands fa-x-twitter"></i></a>
      <a href="https://www.reddit.com/user/nihongotext_com/" target="_blank"><i class="fa-brands fa-reddit-alien"></i></a>
      <a href="https://medium.com/@nihongotext.com" target="_blank"><i class="fa-brands fa-medium"></i></a>
      <a href="https://ko-fi.com/nihongotext" target="_blank"><i class="fa-solid fa-mug-hot"></i></a>
      <a href="https://nihongotextcom.substack.com/subscribe" target="_blank"><i class="fa-solid fa-newspaper"></i></a>
    </nav>
  </div>
</header>

<div class="hero-section">
  <div class="wrap"><h1>Vocabulary Quiz</h1><p>Practice words you haven't mastered yet.</p></div>
</div>

<main class="wrap quiz-main">
  <div class="quiz-container">
    <div id="setupView">
      <div id="lvProgressSetup" class="remaining-setup"></div>
      <div class="form-group">
        <label>JLPT Level</label>
        <select id="lv" onchange="updateProgressDisplay()">
          <option value="n5">N5</option><option value="n4">N4</option><option value="n3">N3</option><option value="n2">N2</option><option value="n1">N1</option>
        </select>
      </div>
      <div class="form-group">
        <label>Category</label>
        <select id="cat"><option value="noun">Noun</option><option value="verb">Verb</option><option value="adjective-i">Adj-i</option><option value="adjective-na">Adj-na</option></select>
      </div>
      <div class="form-group">
        <label>Questions</label>
        <select id="qCount"><option value="3">3</option><option value="5" selected>5</option><option value="10">10</option></select>
      </div>
      <div id="lvProgressButton" class="remaining-setup"></div>
      <button class="btn" onclick="startQuiz()"><i class="fa-solid fa-play"></i> Start Quiz</button>
    </div>

    <div id="quizView" style="display:none">
      <div class="q-card">
        <div id="progress" style="font-size:13px; color:var(--muted); font-weight:700; margin-bottom:10px;"></div>
        <div id="qText" style="font-size:28px; font-weight:800; margin-bottom:20px;"></div>
        <div id="options"></div>
        <button id="nextBtn" class="btn" style="display:none; margin-top:20px;" onclick="handleNext()">Next Question</button>
      </div>
      <div style="margin-top:20px; display:flex; justify-content:center; gap:15px; font-size:13px; font-weight:700; color:var(--muted);">
        <label><input type="radio" name="mode" value="kanji" checked onchange="refreshQuestion()"> Kanji</label>
        <label><input type="radio" name="mode" value="kana" onchange="refreshQuestion()"> Kana</label>
        <label><input type="radio" name="mode" value="both" onchange="refreshQuestion()"> Both</label>
      </div>
    </div>

    <div id="resultView" style="display:none">
      <div style="width:80px;height:80px;border-radius:50%;background:var(--shu);color:#fff;display:flex;flex-direction:column;justify-content:center;align-items:center;margin:0 auto 15px;">
        <div id="scoreNum" style="font-size:24px;font-weight:900;">0</div><div style="font-size:10px;">Score</div>
      </div>
      <h3>Quiz Results</h3>
      <table class="res-table"><tbody id="resList"></tbody></table>
      <div style="display:flex; flex-direction:column; gap:10px; margin-top:20px;">
        <a class="btn" id="shareEmail" href="#"><i class="fa-solid fa-envelope"></i> Email Results to Myself</a>
        <button class="btn" style="background:#fff; color:var(--ink); border:1px solid var(--line);" onclick="printCheckedList()"><i class="fa-solid fa-file-pdf"></i> Export Learned List (PDF)</button>
        <a class="btn" style="background:#ff6719;" href="https://nihongotextcom.substack.com/subscribe" target="_blank"><i class="fa-solid fa-newspaper"></i> Subscribe to Newsletter</a>
        <div class="small-sns-row">
          <a id="shareX" class="btn-small btn-x" href="#" target="_blank"><i class="fa-brands fa-x-twitter"></i> X</a>
          <a id="shareReddit" class="btn-small btn-reddit" href="#" target="_blank"><i class="fa-brands fa-reddit-alien"></i> Reddit</a>
        </div>
        <button class="btn" onclick="location.reload()" style="background:var(--ink); margin-top:10px;">Try Again</button>
      </div>
    </div>
  </div>
</main>

<div id="printArea" style="display:none; padding:40px;">
  <h1 style="color:#e6462d;">Mastered Japanese Words</h1>
  <table border="1" style="width:100%; border-collapse: collapse; margin-top:20px; text-align: left;">
    <thead><tr style="background:#f9fafb;"><th style="padding:10px;">Japanese</th><th style="padding:10px;">Reading</th><th style="padding:10px;">Meaning</th></tr></thead>
    <tbody id="printBody"></tbody>
  </table>
</div>

<footer class="site-footer">
  <div class="wrap footer-inner">
    <div class="footer-copy">© <span id="ft-year"></span> nihongotext.com</div>
    <nav class="sns-nav">
      <a href="https://x.com/nihongotext_com" target="_blank"><i class="fa-brands fa-x-twitter"></i></a>
      <a href="https://www.reddit.com/user/nihongotext_com/" target="_blank"><i class="fa-brands fa-reddit-alien"></i></a>
      <a href="https://medium.com/@nihongotext.com" target="_blank"><i class="fa-brands fa-medium"></i></a>
      <a href="https://ko-fi.com/nihongotext" target="_blank"><i class="fa-solid fa-mug-hot"></i></a>
      <a href="https://nihongotextcom.substack.com/subscribe" target="_blank"><i class="fa-solid fa-newspaper"></i></a>
    </nav>
  </div>
</footer>

<script>
let quizItems = []; let currentIndex = 0; let score = 0;
function getCheckedIds() { return JSON.parse(localStorage.getItem('nt_checked_ids') || '[]'); }
function toggleLearned(wordId) {
  let ids = getCheckedIds();
  if (ids.includes(wordId)) ids = ids.filter(id => id !== wordId); else ids.push(wordId);
  localStorage.setItem('nt_checked_ids', JSON.stringify(ids)); updateProgressDisplay();
}
async function updateProgressDisplay() {
  const lvSelect = document.getElementById('lv'); const lv = lvSelect.value;
  const lvName = lvSelect.options[lvSelect.selectedIndex].text.split(' ')[0];
  try {
    const res = await fetch(`/data/json/${lv}_master_cleaned.json`); const data = await res.json();
    const remain = data.filter(item => !getCheckedIds().includes(item.id)).length;
    const progressText = `Remaining(${lvName}): ${remain} / ${data.length}`;
    document.getElementById('lvProgressSetup').innerText = progressText;
    document.getElementById('lvProgressButton').innerText = progressText;
  } catch(e) {}
}
async function startQuiz() {
  const lv = document.getElementById('lv').value; const cat = document.getElementById('cat').value;
  const qLimit = parseInt(document.getElementById('qCount').value); const checkedIds = getCheckedIds();
  try {
    const res = await fetch(`/data/json/${lv}_master_cleaned.json`); const data = await res.json();
    const available = data.filter(item => item.pos === cat && !checkedIds.includes(item.id));
    if (available.length < qLimit) { alert("Not enough words!"); return; }
    quizItems = available.sort(() => 0.5 - Math.random()).slice(0, qLimit).map(item => {
      const others = data.filter(f => f.ja !== item.ja).sort(() => 0.5 - Math.random()).slice(0, 3);
      return { item, options: [...others, item].sort(() => 0.5 - Math.random()), userCorrect: false };
    });
    document.getElementById('setupView').style.display = 'none'; document.getElementById('quizView').style.display = 'block'; renderQuestion();
  } catch(e) { alert("Data load error."); }
}
function renderQuestion() {
  const q = quizItems[currentIndex]; const mode = document.querySelector('input[name="mode"]:checked').value;
  document.getElementById('progress').innerText = `Question ${currentIndex + 1} / ${quizItems.length}`;
  const qBox = document.getElementById('qText');
  if (mode === 'kana') qBox.innerText = q.item.kana;
  else if (mode === 'both') qBox.innerHTML = `${q.item.ja} <small style="display:block; font-size:16px; color:var(--muted);">(${q.item.kana})</small>`;
  else qBox.innerText = q.item.ja;
  const optBox = document.getElementById('options'); optBox.innerHTML = ''; document.getElementById('nextBtn').style.display = 'none';
  q.options.forEach(opt => {
    const btn = document.createElement('button'); btn.className = 'opt-btn'; btn.innerText = opt.en;
    btn.onclick = () => {
      document.querySelectorAll('.opt-btn').forEach(b => b.disabled = true);
      if (opt.ja === q.item.ja) { btn.classList.add('correct'); score++; q.userCorrect = true; }
      else { btn.classList.add('wrong'); document.querySelectorAll('.opt-btn').forEach(b => { if(b.innerText === q.item.en) b.classList.add('correct'); }); }
      document.getElementById('nextBtn').style.display = 'block';
    }; optBox.appendChild(btn);
  });
}
function handleNext() { currentIndex++; if(currentIndex < quizItems.length) renderQuestion(); else showResults(); }
function refreshQuestion() { if(quizItems.length) renderQuestion(); }
function showResults() {
  document.getElementById('quizView').style.display = 'none'; document.getElementById('resultView').style.display = 'block';
  document.getElementById('scoreNum').innerText = `${score}/${quizItems.length}`;
  const list = document.getElementById('resList'); let emailDetails = "";
  quizItems.forEach((q, i) => {
    const isChecked = getCheckedIds().includes(q.item.id); const row = document.createElement('tr');
    row.innerHTML = `<td><input type="checkbox" ${isChecked ? 'checked' : ''} onchange="toggleLearned('${q.item.id}')"></td>
      <td style="color:${q.userCorrect ? '#10b981':'#ef4444'}"><strong>${q.item.ja}</strong></td><td>${q.item.en}</td>`;
    list.appendChild(row); emailDetails += `Q${i+1}: ${q.item.ja} -> ${q.item.en} [${q.userCorrect ? '✓' : '✗'}]\n`;
  });
  const quizUrl = window.location.href; const substackUrl = "https://nihongotextcom.substack.com/subscribe";
  const body = `My Quiz Score: ${score}/${quizItems.length}\n\n${emailDetails}\n\nContinue Learning:\n${quizUrl}\n\nSubscribe:\n${substackUrl}`;
  document.getElementById('shareEmail').href = `mailto:?subject=Japanese Quiz Results&body=${encodeURIComponent(body)}`;
  const shareText = encodeURIComponent(`I scored ${score}/${quizItems.length} on nihongotext.com!`);
  document.getElementById('shareX').href = `https://twitter.com/intent/tweet?text=${shareText}&url=${encodeURIComponent(quizUrl)}`;
  document.getElementById('shareReddit').href = `https://www.reddit.com/submit?title=${shareText}&url=${encodeURIComponent(quizUrl)}`;
}
async function printCheckedList() {
  const levels = ['n5','n4','n3','n2','n1']; const checkedIds = getCheckedIds();
  const printBody = document.getElementById('printBody'); printBody.innerHTML = '';
  const fetches = levels.map(lv => fetch(`/data/json/${lv}_master_cleaned.json`).then(r => r.ok ? r.json() : []));
  const allData = await Promise.all(fetches);
  allData.flat().filter(item => checkedIds.includes(item.id)).forEach(item => {
    printBody.innerHTML += `<tr><td style="padding:10px;">${item.ja}</td><td style="padding:10px;">${item.kana}</td><td style="padding:10px;">${item.en}</td></tr>`;
  });
  if (!printBody.innerHTML) return alert("Check learned words first!"); window.print();
}
document.addEventListener('DOMContentLoaded', () => { document.getElementById('ft-year').textContent = new Date().getFullYear(); updateProgressDisplay(); });
</script>
</body>
</html>
