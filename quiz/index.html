<!doctype html>
<html lang="ja">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>Quiz | nihongotext.com</title>
<link rel="icon" href="/favicon.ico" />
<link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet">

<script async src="https://www.googletagmanager.com/gtag/js?id=G-9QSHWJE0HZ"></script>

  window.dataLayer = window.dataLayer || [];
  function gtag(){ dataLayer.push(arguments); }
  gtag('js', new Date());

<style>
:root{ --shu:#e6462d; --shu-tint:#fff2ef; --ink:#1f2937; --muted:#6b7280; --line:#e5e7eb; --card:#fff7f6; }
*{ box-sizing:border-box }

html,body{
  margin:0; background:#fff; color:var(--ink);
  font:16px/1.65 system-ui,-apple-system,Segoe UI,Roboto,Helvetica,Arial,
        "Noto Sans JP","Hiragino Kaku Gothic ProN","Yu Gothic UI","Meiryo",sans-serif;
}
a{ color:inherit; text-decoration:none }

.container{ max-width:600px; margin:0 auto; padding:2rem 1.25rem }
header{ text-align:center; margin-bottom:2rem }
h1{ font-size:1.5rem; font-weight:800; color:var(--shu); margin:0 }

/* Setup View */
#setupView{ background:#f9fafb; border:1px solid var(--line); padding:2rem; border-radius:1rem; text-align:center }
.form-group{ margin-bottom:1.5rem; text-align:left }
label{ display:block; font-size:0.85rem; font-weight:700; margin-bottom:0.5rem; color:var(--muted) }
select{ width:100%; padding:0.75rem; border:1px solid var(--line); border-radius:0.5rem; font-size:1rem; background:#fff }

.btn{
  background:var(--shu); color:#fff; border:none; padding:1rem 2rem; 
  border-radius:0.5rem; font-size:1rem; font-weight:700; cursor:pointer; width:100%;
}
.btn:disabled{ opacity:0.5; cursor:not-allowed }

/* Quiz View */
#quizView{ display:none }
.progress{ font-size:0.85rem; color:var(--muted); margin-bottom:1rem; text-align:center }
.q-card{ background:var(--card); border:1px solid #ffe4e1; padding:2rem; border-radius:1rem; margin-bottom:1.5rem }
.q-text{ font-size:1.25rem; font-weight:700; line-height:1.5; margin-bottom:1rem; text-align:center }
.q-hint{ font-size:0.9rem; color:var(--muted); text-align:center; margin-bottom:1rem }

.options{ display:grid; gap:0.75rem }
.opt-btn{
  background:#fff; border:1px solid var(--line); padding:1rem; border-radius:0.5rem;
  text-align:left; font-size:1rem; font-weight:600; cursor:pointer; transition:0.2s;
}
.opt-btn:hover{ border-color:var(--shu); background:var(--shu-tint) }
.opt-btn.correct{ background:#d1fae5; border-color:#10b981; color:#065f46 }
.opt-btn.wrong{ background:#fee2e2; border-color:#ef4444; color:#991b1b }

/* Display Mode Toggle */
.display-mode{ margin-top:1.5rem; display:flex; justify-content:center; gap:1rem }
.radio-label{ font-size:0.8rem; color:var(--muted); cursor:pointer; display:flex; align-items:center; gap:0.3rem }

/* Result View */
#resultView{ display:none; text-align:center }
.score-circle{ width:120px; height:120px; border-radius:50%; background:var(--shu); color:#fff; display:flex; flex-direction:column; justify-content:center; align-items:center; margin:0 auto 1.5rem }
.score-circle .num{ font-size:2rem; font-weight:800 }

.res-table{ width:100%; border-collapse:collapse; margin-top:2rem; text-align:left; font-size:0.9rem }
.res-table th, .res-table td{ padding:0.75rem; border-bottom:1px solid var(--line) }
.res-status{ width:30px; font-weight:bold }
.res-correct{ color:#10b981 }
.res-wrong{ color:#ef4444 }

#nextBtn{ margin-top:1.5rem; display:none }
#emailBtn{ background:#1f2937; margin-top:1rem }
</style>
</head>

<body>
<div class="container">
  <header>
    <h1><a href="/">nihongotext.com Quiz</a></h1>
  </header>

  <div id="setupView">
    <div class="form-group">
      <label>JLPT Level</label>
      <select id="lv">
        <option value="n5">N5</option>
        <option value="n4">N4</option>
        <option value="n3">N3</option>
        <option value="n2">N2</option>
        <option value="n1">N1</option>
      </select>
    </div>
    <div class="form-group">
      <label>Category</label>
      <select id="cat">
        <option value="noun">名詞 (Noun)</option>
        <option value="verb">動詞 (Verb)</option>
        <option value="adjective-i">い形容詞 (Adj-i)</option>
        <option value="adjective-na">な形容詞 (Adj-na)</option>
        <option value="adverb">副詞 (Adv)</option>
        <option value="particle">助詞 (Part)</option>
        <option value="expression">文法/表現 (Grammar)</option>
        <option value="numeral">数詞 (Numeral)</option>
      </select>
    </div>
    <button class="btn" id="startBtn">Start Quiz</button>
  </div>

  <div id="quizView">
    <div class="progress" id="progress">Question 1 / 10</div>
    <div class="q-card">
      <div class="q-text" id="qText"></div>
      <div class="q-hint" id="qHint"></div>
      <div class="options" id="options"></div>
    </div>
    <button class="btn" id="nextBtn">Next Question</button>

    <div class="display-mode" id="displayModeGroup">
      <label class="radio-label"><input type="radio" name="mode" value="kanji" checked> Kanji</label>
      <label class="radio-label"><input type="radio" name="mode" value="kana"> Kana</label>
    </div>
  </div>

  <div id="resultView">
    <h2>Result</h2>
    <div class="score-circle">
      <div class="num" id="scoreNum">0</div>
      <div style="font-size:0.8rem">Score</div>
    </div>
    <table class="res-table">
      <tbody id="resList"></tbody>
    </table>
    <button class="btn" onclick="location.reload()" style="margin-top:2rem">Try Again</button>
    <button class="btn" id="emailBtn">Send Results by Email</button>
  </div>
</div>

<script>
let allVocab = [];
let quiz = [];
let idx = 0;
let score = 0;

const audioInquiryUrl = "https://nihongotext.com/inquiry/index.html";

// 1. Fetch Master Data and Filter
async function startQuiz() {
  const lv = document.getElementById('lv').value;
  const cat = document.getElementById('cat').value;
  const btn = document.getElementById('startBtn');
  
  btn.disabled = true;
  btn.innerText = "Loading...";

  try {
    const res = await fetch(`/assets/json/${lv}_master_cleaned.json`);
    if(!res.ok) throw new Error("File not found");
    const data = await res.json();
    
    // Filter by selected part of speech (pos)
    const filtered = data.filter(item => item.pos === cat);
    
    if (filtered.length < 4) {
      alert("Not enough words in this category to start a quiz. Please try another category.");
      location.reload();
      return;
    }

    createQuiz(filtered);
    
    document.getElementById('setupView').style.display = 'none';
    document.getElementById('quizView').style.display = 'block';
    renderQuestion();

  } catch (err) {
    console.error(err);
    alert("Could not load quiz data.");
    location.reload();
  }
}

// 2. Build Quiz Array
function createQuiz(list) {
  const shuffled = [...list].sort(() => 0.5 - Math.random());
  const selected = shuffled.slice(0, 10);
  
  quiz = selected.map(item => {
    // Determine the question content (use example sentence if available)
    let sentence = item.ja;
    let hint = item.en;
    
    if (item.examples && item.examples.length > 0) {
      const ex = item.examples[Math.floor(Math.random() * item.examples.length)];
      // Replace the answer word with blanks in the example sentence
      sentence = ex.ja.replace(item.ja, " 【 ___ 】 ");
      hint = ex.en;
    }

    // Choices (1 correct + 3 random)
    const others = list.filter(w => w.ja !== item.ja).sort(() => 0.5 - Math.random()).slice(0, 3);
    const options = [...others, item].sort(() => 0.5 - Math.random());

    return { item, sentence, hint, options, answer: item.ja, userCorrect: false };
  });
}

// 3. Render Question
function renderQuestion() {
  const q = quiz[idx];
  const mode = document.querySelector('input[name="mode"]:checked').value;
  
  document.getElementById('nextBtn').style.display = 'none';
  document.getElementById('progress').innerText = `Question ${idx + 1} / ${quiz.length}`;
  document.getElementById('qText').innerText = q.sentence;
  document.getElementById('qHint').innerText = q.hint;
  
  const optContainer = document.getElementById('options');
  optContainer.innerHTML = '';

  q.options.forEach(opt => {
    const btn = document.createElement('button');
    btn.className = 'opt-btn';
    // Show either ja (kanji) or kana based on display mode
    btn.innerText = (mode === 'kana') ? (opt.kana || opt.ja) : opt.ja;
    
    btn.onclick = () => {
      const allBtns = optContainer.querySelectorAll('.opt-btn');
      allBtns.forEach(b => b.disabled = true);
      
      if (opt.ja === q.answer) {
        btn.classList.add('correct');
        score++;
        q.userCorrect = true;
      } else {
        btn.classList.add('wrong');
        // highlight the correct one
        allBtns.forEach(b => {
          if (b.innerText === q.answer || (mode === 'kana' && b.innerText === (q.item.kana || q.item.ja))) {
            b.classList.add('correct');
          }
        });
      }
      document.getElementById('nextBtn').style.display = 'block';
    };
    optContainer.appendChild(btn);
  });
}

// 4. Show Results
function showResult() {
  document.getElementById('quizView').style.display = 'none';
  document.getElementById('resultView').style.display = 'block';
  document.getElementById('scoreNum').innerText = `${score} / ${quiz.length}`;

  const list = document.getElementById('resList');
  let emailBody = `My Japanese Quiz Results\nScore: ${score}/${quiz.length}\n\n`;

  quiz.forEach((q, i) => {
    const isCorrect = q.userCorrect;
    const statusIcon = isCorrect ? 
      '<span class="res-status res-correct">✓</span>' : 
      '<span class="res-status res-wrong">✗</span>';
    
    const row = document.createElement('tr');
    row.innerHTML = `
      <td class="res-status">${statusIcon}</td>
      <td>
        <strong>Q${i+1}:</strong> ${q.sentence}<br>
        <span style="font-size:12px; color:var(--muted);">Answer: <strong>${q.item.ja}</strong> (${q.item.kana})</span>
      </td>
    `;
    list.appendChild(row);

    emailBody += `Q${i+1}: ${q.sentence}\n`;
    emailBody += `Result: ${isCorrect ? 'Correct' : 'Wrong'}\n`;
    emailBody += `Answer: ${q.item.ja} (${q.item.kana})\n\n`;
  });

  emailBody += `---\nLearn more Japanese at: https://nihongotext.com\n`;

  document.getElementById('emailBtn').onclick = () => {
    const subject = encodeURIComponent(`Nihongotext Quiz Results (${score}/${quiz.length})`);
    const body = encodeURIComponent(emailBody);
    window.location.href = `mailto:?subject=${subject}&body=${body}`;
  };
}

// Event Listeners
document.getElementById('displayModeGroup').addEventListener('change', () => {
    if (quiz.length > 0 && idx < quiz.length) renderQuestion();
});

document.getElementById('nextBtn').onclick = () => {
  idx++;
  if (idx < quiz.length) renderQuestion();
  else showResult();
};

document.getElementById('startBtn').onclick = startQuiz;
</script>
</body>
</html>
