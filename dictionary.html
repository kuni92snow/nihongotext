<!doctype html>
<html lang="ja">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>Vocabulary Tool | nihongotext.com</title>

<link rel="icon" href="/favicon.ico" />
<link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet">

<script async src="https://www.googletagmanager.com/gtag/js?id=G-9QSHWJE0HZ"></script>
<script>
  window.dataLayer = window.dataLayer || [];
  function gtag(){ dataLayer.push(arguments); }
  gtag('js', new Date());
  gtag('config', 'G-9QSHWJE0HZ', { send_page_view:false });
</script>

<style>
/* --- Design Tokens --- */
:root{ --shu:#e6462d; --shu-tint:#fff2ef; --ink:#1f2937; --muted:#6b7280; --line:#e5e7eb; --card:#fff7f6; }
*{ box-sizing:border-box }

/* Font Stack */
html,body{
  margin:0; background:#fff; color:var(--ink);
  font:16px/1.65 system-ui,-apple-system,Segoe UI,Roboto,Helvetica,Arial,
        "Noto Sans JP","Hiragino Kaku Gothic ProN","Yu Gothic UI","Meiryo",sans-serif;
}

/* Layout */
.container{ max-width:800px; margin:0 auto; padding:2rem 1.25rem }
header{ margin-bottom:2.5rem; text-align:center }
h1{ font-size:1.75rem; font-weight:800; color:var(--shu); margin:0 0 0.5rem }
.sub{ color:var(--muted); font-size:0.95rem }

/* Search Area */
.search-box{
  background:#f9fafb; border:1px solid var(--line); border-radius:1rem;
  padding:1.5rem; margin-bottom:2rem;
}
.row{ display:flex; gap:0.75rem; margin-bottom:1rem }
select, input{
  padding:0.75rem 1rem; border:1px solid var(--line); border-radius:0.5rem;
  font-size:1rem; background:#fff; outline:none; transition:0.2s;
}
select:focus, input:focus{ border-color:var(--shu); box-shadow:0 0 0 3px var(--shu-tint) }
select{ width:120px; cursor:pointer }
input{ flex:1 }

/* POS Chips */
.chips{ display:flex; flex-wrap:wrap; gap:0.5rem }
.chip{
  padding:0.4rem 0.9rem; border-radius:2rem; background:#fff; border:1px solid var(--line);
  font-size:0.85rem; color:var(--muted); cursor:pointer; transition:0.2s; user-select:none;
}
.chip:hover{ border-color:var(--shu); color:var(--shu) }
.chip.active{ background:var(--shu); border-color:var(--shu); color:#fff; font-weight:600 }

/* List */
#list{ display:grid; gap:1rem }
.card{
  background:var(--card); border:1px solid #ffe4e1; border-radius:1rem;
  padding:1.25rem; transition:0.2s; position:relative;
}
.card:hover{ border-color:var(--shu); transform:translateY(-2px); box-shadow:0 4px 12px rgba(230,70,45,0.08) }

.card-head{ display:flex; justify-content:space-between; align-items:flex-start; margin-bottom:0.75rem }
.tag{ font-size:0.7rem; font-weight:700; background:var(--shu-tint); color:var(--shu); padding:0.2rem 0.6rem; border-radius:0.4rem; text-transform:uppercase }

.ja{ display:block; font-size:1.4rem; font-weight:700; margin-bottom:0.25rem }
.kana{ display:block; font-size:0.9rem; color:var(--muted); margin-bottom:0.75rem }
.en{ display:block; font-size:1rem; color:var(--ink); margin-bottom:1rem }

/* Examples */
.example-details{ border-top:1px solid #ffe4e1; margin-top:1rem; padding-top:1rem }
.example-details summary{ font-size:0.85rem; color:var(--shu); cursor:pointer; font-weight:600; outline:none }
.example-list{ margin-top:0.75rem; display:grid; gap:0.75rem }
.ex-item{ font-size:0.9rem; background:#fff; padding:0.75rem; border-radius:0.6rem; border:1px solid #fff1f0 }
.ex-item p{ margin:0 }
.ex-item strong{ color:var(--ink); display:block; margin-bottom:0.2rem }
.ex-item em{ font-style:normal; color:var(--muted); display:block; font-size:0.8rem; margin-bottom:0.2rem }

/* Audio Link */
.audio-link{ font-size:0.75rem; color:var(--muted); text-decoration:none; display:inline-flex; align-items:center; gap:0.3rem; margin-top:0.5rem }
.audio-link:hover{ color:var(--shu) }

/* Utility */
.counter{ margin-bottom:1rem; font-size:0.85rem; color:var(--muted) }
.no-results{ text-align:center; padding:3rem; color:var(--muted) }
</style>
</head>

<body>
<div class="container">
  <header>
    <h1>Vocabulary Tool</h1>
    <p class="sub">Find words and grammar for your level.</p>
  </header>

  <div class="search-box">
    <div class="row">
      <select id="lv">
        <option value="n5">N5</option>
        <option value="n4">N4</option>
        <option value="n3">N3</option>
        <option value="n2">N2</option>
        <option value="n1">N1</option>
      </select>
      <input type="text" id="kw" placeholder="Search by word or English..." autocomplete="off">
    </div>
    
    <div class="chips" id="posChips">
      <span class="chip active" data-pos="all">すべて (All)</span>
      <span class="chip" data-pos="noun">名詞 (Noun)</span>
      <span class="chip" data-pos="verb">動詞 (Verb)</span>
      <span class="chip" data-pos="adjective-i">い形容詞 (Adj-i)</span>
      <span class="chip" data-pos="adjective-na">な形容詞 (Adj-na)</span>
      <span class="chip" data-pos="adverb">副詞 (Adv)</span>
      <span class="chip" data-pos="particle">助詞 (Part)</span>
      <span class="chip" data-pos="conjunction">接続詞 (Conj)</span>
      <span class="chip" data-pos="expression">文法/表現 (Gram)</span>
    </div>
  </div>

  <div class="counter" id="count">0 words found</div>
  <div id="list"></div>
</div>

<script>
let allVocab = [];
const audioInquiryUrl = "https://nihongotext.com/inquiry/index.html";

// Initialize data fetching
async function initVocab() {
  const lv = document.getElementById('lv').value;
  // ファイル名は今回の「重複削除済み」の名前に合わせています
  const filePath = `/assets/json/${lv}_master_cleaned.json`;
  
  const listEl = document.getElementById('list');
  listEl.innerHTML = '<div class="no-results">Loading...</div>';

  try {
    const res = await fetch(filePath);
    if(!res.ok) throw new Error("File not found");
    allVocab = await res.json();
    performSearch();
  } catch (err) {
    console.error(err);
    listEl.innerHTML = `<div class="no-results">Could not load vocabulary for ${lv.toUpperCase()}.</div>`;
  }
}

// Search & Filter logic
function performSearch() {
  const kw = document.getElementById('kw').value.toLowerCase().trim();
  const activeChip = document.querySelector('.chip.active');
  const posFilter = activeChip ? activeChip.getAttribute('data-pos') : 'all';

  const filtered = allVocab.filter(item => {
    // POS Filter (using the new "pos" field)
    const matchPos = (posFilter === 'all' || item.pos === posFilter);
    
    // Keyword Search
    const matchKw = !kw || 
      item.ja.includes(kw) || 
      (item.kana && item.kana.includes(kw)) || 
      (item.en && item.en.toLowerCase().includes(kw)) ||
      (item.ro && item.ro.toLowerCase().includes(kw));
    
    return matchPos && matchKw;
  });

  renderList(filtered);
}

// UI Rendering
function renderList(data) {
  const listEl = document.getElementById('list');
  const countEl = document.getElementById('count');
  listEl.innerHTML = '';
  countEl.innerText = `${data.length} words found`;

  if (data.length === 0) {
    listEl.innerHTML = '<div class="no-results">No words matched your search.</div>';
    return;
  }

  data.forEach(item => {
    const card = document.createElement('div');
    card.className = 'card';

    // Audio Request Link
    const getAudioHtml = () => `
      <a href="${audioInquiryUrl}" target="_blank" class="audio-link">
        <i class="fa-solid fa-circle-play"></i> Request Audio
      </a>`;

    // Examples HTML
    let examplesHtml = '';
    if (item.examples && item.examples.length > 0) {
      examplesHtml = `
        <details class="example-details">
          <summary>Show Examples (${item.examples.length})</summary>
          <div class="example-list">
            ${item.examples.map(ex => `
              <div class="ex-item">
                <p>
                  <strong>${ex.ja}</strong>
                  ${ex.ro ? `<em>${ex.ro}</em>` : ''}
                  ${ex.en}
                </p>
                ${getAudioHtml()}
              </div>
            `).join('')}
          </div>
        </details>`;
    }

    // POS label mapping (Internal key to Display label)
    const posLabelMap = {
      "noun": "Noun", "verb": "Verb", "adjective-i": "Adj-i", "adjective-na": "Adj-na",
      "adverb": "Adv", "particle": "Particle", "conjunction": "Conj", "expression": "Grammar",
      "numeral": "Number", "interjection": "Intj", "pronoun": "Pronoun", "interrogative": "Quest"
    };
    const displayPos = posLabelMap[item.pos] || item.pos;

    card.innerHTML = `
      <div class="card-head">
        <span class="tag">${displayPos}</span>
        <small style="color:var(--muted)">${item.id || ''}</small>
      </div>
      <span class="ja">${item.ja}</span>
      <span class="kana">${item.kana || ''}</span>
      <span class="en">${item.en}</span>
      ${getAudioHtml()}
      ${examplesHtml}
    `;
    listEl.appendChild(card);
  });
}

// Event Listeners
document.getElementById('lv').addEventListener('change', initVocab);

document.getElementById('posChips').addEventListener('click', e => {
  if (e.target.classList.contains('chip')) {
    document.querySelectorAll('.chip').forEach(c => c.classList.remove('active'));
    e.target.classList.add('active');
    performSearch();
  }
});

let timer;
document.getElementById('kw').addEventListener('input', () => {
  clearTimeout(timer);
  timer = setTimeout(performSearch, 300);
});

// Start
initVocab();
</script>
</body>
</html>
