<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>Dictionary - nihongotext.com</title>
<link rel="icon" href="/favicon.ico" />
<link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet">
<script async src="https://www.googletagmanager.com/gtag/js?id=G-9QSHWJE0HZ"></script>
<script>
  window.dataLayer = window.dataLayer || [];
  function gtag(){ dataLayer.push(arguments); }
  gtag('js', new Date());
  gtag('config', 'G-9QSHWJE0HZ', { send_page_view:false });

<style>
/* --- nihongotext.com 共通スタイル --- */
:root{ --shu:#e6462d; --shu-tint:#fff2ef; --ink:#1f2937; --muted:#6b7280; --line:#e5e7eb; --card:#fff7f6; }
*{box-sizing:border-box}
html,body{ margin:0;background:#fff;color:var(--ink); font:16px/1.65 system-ui,-apple-system,sans-serif }
.wrap{max-width:800px;margin:0 auto;padding:0 16px}

/* ヘッダー・フッターのスタイルは partials から読み込まれるため、ここでは検索UIのスタイルのみ記述 */
.dictionary-main{ padding:30px 0 }
.search-box{ background:#f9fafb; border:1px solid var(--line); border-radius:12px; padding:20px; margin:20px 0 30px; }
input#kw{ width:100%; padding:14px; border:1px solid var(--line); border-radius:8px; font-size:18px; outline:none; margin-bottom:15px; }
input#kw:focus{ border-color:var(--shu); }
.chips{ display:flex; flex-wrap:wrap; gap:8px }
.chip{ padding:6px 14px; border-radius:20px; background:#fff; border:1px solid var(--line); font-size:13px; color:var(--muted); cursor:pointer; user-select:none; transition:0.2s; }
.chip.active{ background:var(--shu); border-color:var(--shu); color:#fff; font-weight:600 }
#list{ display:grid; gap:16px }
.card{ background:var(--card); border:1px solid #ffe4e1; border-radius:12px; padding:20px; position:relative; }
.tag{ font-size:11px; font-weight:700; background:var(--shu-tint); color:var(--shu); padding:3px 8px; border-radius:4px; text-transform:uppercase }
.lvl-tag{ background:var(--ink); color:#fff }
.ja{ display:block; font-size:24px; font-weight:800; margin-bottom:4px }
.kana{ display:block; font-size:14px; color:var(--muted); margin-bottom:10px }
.en{ display:block; font-size:16px; color:var(--ink); font-weight:500; margin-bottom:15px }
.example-details{ border-top:1px solid #ffe4e1; margin-top:12px; padding-top:12px }
.example-details summary{ font-size:14px; color:var(--shu); cursor:pointer; font-weight:600; }
.ex-item{ font-size:15px; background:#fff; padding:12px; border-radius:8px; border:1px solid #fff1f0; margin-top:8px }
.audio-link{ font-size:13px; color:var(--muted); text-decoration:none; display:inline-flex; align-items:center; gap:5px; margin-top:8px }
.audio-link:hover{ color:var(--shu) }
</style>
</head>
<body>

  <center>
    <nav class="nav-links">
      <a href="/" style="color:var(--shu);">Home</a>
      <a href="/dictionary.html">Vocabulary Tool</a>
      <a href="/quiz/index.html">Quiz</a>
      <a href="/blog/index.html">Blog</a>
      <a href="/inquiry/index.html">Inquiry</a>
    </nav>
 </center>

<main class="wrap dictionary-main">
  <h2>Japanese Dictionary</h2>
  <div class="search-box">
    <input type="text" id="kw" placeholder="Search word, hiragana or English..." autocomplete="off">
    <div class="chips" id="posChips">
      <span class="chip active" data-pos="all">すべて (All)</span>
      <span class="chip" data-pos="noun">名詞 (Noun)</span>
      <span class="chip" data-pos="verb">動詞 (Verb)</span>
      <span class="chip" data-pos="adjective-i">い形容詞 (Adj-i)</span>
      <span class="chip" data-pos="adjective-na">な形容詞 (Adj-na)</span>
      <span class="chip" data-pos="adverb">副詞 (Adv)</span>
      <span class="chip" data-pos="expression">文法/表現 (Gram)</span>
    </div>
  </div>
  <div id="status" style="font-size:13px; color:var(--muted); margin-bottom:10px;">Loading database...</div>
  <div id="list"></div>
</main>

  <center>
    <nav class="nav-links">
      <a href="/" style="color:var(--shu);">Home</a>
      <a href="/dictionary.html">Vocabulary Tool</a>
      <a href="/quiz/index.html">Quiz</a>
      <a href="/blog/index.html">Blog</a>
      <a href="/inquiry/index.html">Inquiry</a>
    </nav>
 </center>

<script>
let allVocab = [];
const audioUrl = "https://nihongotext.com/inquiry/index.html";
async function initDictionary() {
  const levels = ['n5', 'n4', 'n3', 'n2', 'n1'];
  const fetches = levels.map(async lv => {
    try {
      const res = await fetch(`data/json/${lv}_master_cleaned.json`);
      if (!res.ok) return [];
      const data = await res.json();
      return data.map(d => ({ ...d, level: lv.toUpperCase() }));
    } catch (e) { return []; }
  });
  const results = await Promise.all(fetches);
  allVocab = results.flat();
  document.getElementById('status').innerText = `${allVocab.length} words loaded.`;
  const params = new URLSearchParams(window.location.search);
  const kw = params.get('kw');
  if (kw) document.getElementById('kw').value = decodeURIComponent(kw);
  performSearch();
}
function performSearch() {
  const kw = document.getElementById('kw').value.toLowerCase().trim();
  const posFilter = document.querySelector('.chip.active').getAttribute('data-pos');
  const filtered = allVocab.filter(item => {
    const matchPos = (posFilter === 'all' || item.pos === posFilter);
    const matchKw = !kw || item.ja.includes(kw) || item.kana.includes(kw) || item.en.toLowerCase().includes(kw);
    return matchPos && matchKw;
  });
  render(filtered);
}
function render(data) {
  const listEl = document.getElementById('list');
  listEl.innerHTML = data.length === 0 ? '<p>No matches found.</p>' : '';
  data.slice(0, 300).forEach(item => {
    const card = document.createElement('div');
    card.className = 'card';
    const audioBtn = `<a href="${audioUrl}" target="_blank" class="audio-link"><i class="fa-solid fa-circle-play"></i> Audio Request</a>`;
    let exHtml = item.examples && item.examples.length > 0 ? `<details class="example-details"><summary>Examples (${item.examples.length})</summary><div class="example-list">` + item.examples.map(ex => `<div class="ex-item"><strong>${ex.ja}</strong>${ex.en}${audioBtn}</div>`).join('') + `</div></details>` : '';
    const posMap = { "noun":"Noun", "verb":"Verb", "adjective-i":"Adj-i", "adjective-na":"Adj-na", "adverb":"Adv", "expression":"Gram" };
    card.innerHTML = `<div class="card-head"><span class="tag lvl-tag">${item.level}</span><span class="tag">${posMap[item.pos] || item.pos}</span></div><span class="ja">${item.ja}</span><span class="kana">${item.kana || ''}</span><span class="en">${item.en}</span>${audioBtn}${exHtml}`;
    listEl.appendChild(card);
  });
}
document.getElementById('posChips').addEventListener('click', e => {
  if (e.target.classList.contains('chip')) {
    document.querySelectorAll('.chip').forEach(c => c.classList.remove('active'));
    e.target.classList.add('active');
    performSearch();
  }
});
document.getElementById('kw').addEventListener('input', performSearch);
initDictionary();
</script>
</body>
</html>
