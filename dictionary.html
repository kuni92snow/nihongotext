<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>Dictionary - nihongotext.com</title>

<link rel="icon" href="/favicon.ico" />
<link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet">

<script async src="https://www.googletagmanager.com/gtag/js?id=G-9QSHWJE0HZ"></script>

  window.dataLayer = window.dataLayer || [];
  function gtag(){ dataLayer.push(arguments); }
  gtag('js', new Date());
  gtag('config', 'G-9QSHWJE0HZ', { send_page_view:false });

<style>
/* --- nihongotext.com 共通スタイル (self-intro.html等と完全一致) --- */
:root{ --shu:#e6462d; --shu-tint:#fff2ef; --ink:#1f2937; --muted:#6b7280; --line:#e5e7eb; --card:#fff7f6; }
*{box-sizing:border-box}
html,body{ margin:0;background:#fff;color:var(--ink); font:16px/1.65 system-ui,-apple-system,sans-serif }
.wrap{max-width:800px;margin:0 auto;padding:0 16px}

/* Header & Footer (完全コピー) */
.topbar{border-top:4px solid var(--shu);border-bottom:1px solid var(--shu-tint);background:#fff;padding:20px 0}
.brand{font-weight:900;font-size:32px;color:var(--shu);text-align:center;display:block;text-decoration:none}
nav{display:flex;justify-content:center;gap:15px;margin-top:10px;flex-wrap:wrap}
nav a{color:var(--ink);text-decoration:none;font-weight:600;font-size:14px}
nav a:hover{color:var(--shu)}
footer{border-top:1px solid var(--line);padding:40px 0;margin-top:60px;text-align:center;color:var(--muted);font-size:14px}

/* 検索エリアの独自スタイル */
.search-box{ background:#f9fafb; border:1px solid var(--line); border-radius:12px; padding:20px; margin:30px 0; }
input#kw{ width:100%; padding:14px; border:1px solid var(--line); border-radius:8px; font-size:18px; outline:none; margin-bottom:15px; }
input#kw:focus{ border-color:var(--shu); }
.chips{ display:flex; flex-wrap:wrap; gap:8px }
.chip{ padding:6px 14px; border-radius:20px; background:#fff; border:1px solid var(--line); font-size:13px; color:var(--muted); cursor:pointer; user-select:none; }
.chip.active{ background:var(--shu); border-color:var(--shu); color:#fff; font-weight:600 }

/* カードデザイン */
#list{ display:grid; gap:16px }
.card{ background:var(--card); border:1px solid #ffe4e1; border-radius:12px; padding:20px; position:relative; }
.card-head{ display:flex; gap:8px; margin-bottom:10px; align-items: center; }
.tag{ font-size:11px; font-weight:700; background:var(--shu-tint); color:var(--shu); padding:3px 8px; border-radius:4px; text-transform:uppercase }
.lvl-tag{ background:var(--ink); color:#fff }
.ja{ display:block; font-size:24px; font-weight:800; margin-bottom:4px }
.kana{ display:block; font-size:14px; color:var(--muted); margin-bottom:10px }
.en{ display:block; font-size:16px; color:var(--ink); font-weight:500; margin-bottom:15px }

/* 例文と音声 */
.example-details{ border-top:1px solid #ffe4e1; margin-top:12px; padding-top:12px }
.example-details summary{ font-size:14px; color:var(--shu); cursor:pointer; font-weight:600; }
.ex-item{ font-size:15px; background:#fff; padding:12px; border-radius:8px; border:1px solid #fff1f0; margin-top:8px }
.audio-link{ font-size:13px; color:var(--muted); text-decoration:none; display:inline-flex; align-items:center; gap:5px; margin-top:8px }
.audio-link:hover{ color:var(--shu) }

.status-msg{ font-size:13px; color:var(--muted); margin-bottom:10px; font-weight:bold }
.loading-box{ text-align:center; padding:50px; color:var(--shu); font-weight:bold }
</style>
</head>

<body>

<div class="topbar">
  <div class="wrap">
    <a href="/" class="brand">nihongotext.com</a>
    <nav>
      <a href="/">HOME</a>
      <a href="/dictionary.html">DICTIONARY</a>
      <a href="/quiz/">QUIZ</a>
    </nav>
  </div>
</div>

<div class="wrap">
  <div class="search-section">
    <h2 style="margin-top:30px">Japanese Dictionary</h2>
    
    <div class="search-box">
      <input type="text" id="kw" placeholder="Search word, hiragana or English..." autocomplete="off">
      <div class="chips" id="posChips">
        <span class="chip active" data-pos="all">すべて (All)</span>
        <span class="chip" data-pos="noun">名詞 (Noun)</span>
        <span class="chip" data-pos="verb">動詞 (Verb)</span>
        <span class="chip" data-pos="adjective-i">い形容詞 (Adj-i)</span>
        <span class="chip" data-pos="adjective-na">な形容詞 (Adj-na)</span>
        <span class="chip" data-pos="adverb">副詞 (Adv)</span>
        <span class="chip" data-pos="particle">助詞 (Part)</span>
        <span class="chip" data-pos="expression">文法/表現 (Gram)</span>
      </div>
    </div>

    <div class="status-msg" id="status">Loading database...</div>
    <div id="list"><div class="loading-box">Checking JSON files in data/json/...</div></div>
  </div>
</div>

<footer>
  <div class="wrap">
    <p>© 2026 nihongotext.com - Authentic Japanese Learning Materials</p>
  </div>
</footer>

<script>
let allVocab = [];
const audioUrl = "https://nihongotext.com/inquiry/index.html";

// 1. JSON読み込み (data/json/ フォルダを使用)
async function initDictionary() {
  const levels = ['n5', 'n4', 'n3', 'n2', 'n1'];
  const statusEl = document.getElementById('status');
  
  const fetches = levels.map(async lv => {
    try {
      const res = await fetch(`data/json/${lv}_master_cleaned.json`);
      if (!res.ok) return [];
      const data = await res.json();
      return data.map(d => ({ ...d, level: lv.toUpperCase() }));
    } catch (e) {
      return [];
    }
  });

  const results = await Promise.all(fetches);
  allVocab = results.flat();

  if (allVocab.length === 0) {
    statusEl.innerText = "Error: Database files not found.";
    document.getElementById('list').innerHTML = '<p style="text-align:center;padding:40px;color:red">JSON files not found in <b>data/json/</b> folder.</p>';
    return;
  }

  statusEl.innerText = `${allVocab.length} words ready.`;

  // URLパラメータの kw を自動入力
  const params = new URLSearchParams(window.location.search);
  const kw = params.get('kw');
  if (kw) document.getElementById('kw').value = decodeURIComponent(kw);

  performSearch();
}

// 2. 検索・フィルタ
function performSearch() {
  const kw = document.getElementById('kw').value.toLowerCase().trim();
  const activeChip = document.querySelector('.chip.active');
  const posFilter = activeChip ? activeChip.getAttribute('data-pos') : 'all';

  const filtered = allVocab.filter(item => {
    const matchPos = (posFilter === 'all' || item.pos === posFilter);
    const matchKw = !kw || 
      (item.ja && item.ja.includes(kw)) || 
      (item.kana && item.kana.includes(kw)) || 
      (item.en && item.en.toLowerCase().includes(kw)) ||
      (item.ro && item.ro.toLowerCase().includes(kw));
    return matchPos && matchKw;
  });

  render(filtered);
}

// 3. 描画
function render(data) {
  const listEl = document.getElementById('list');
  listEl.innerHTML = '';

  if (data.length === 0) {
    listEl.innerHTML = '<p style="text-align:center;padding:40px">No matches found.</p>';
    return;
  }

  data.slice(0, 300).forEach(item => {
    const card = document.createElement('div');
    card.className = 'card';
    const audioBtn = `<a href="${audioUrl}" target="_blank" class="audio-link"><i class="fa-solid fa-circle-play"></i> Audio Request</a>`;

    let ex = '';
    if (item.examples && item.examples.length > 0) {
      ex = `<details class="example-details"><summary>Examples (${item.examples.length})</summary><div class="example-list">` +
           item.examples.map(e => `<div class="ex-item"><strong>${e.ja}</strong>${e.en}${audioBtn}</div>`).join('') +
           `</div></details>`;
    }

    const posMap = { "noun":"Noun", "verb":"Verb", "adjective-i":"Adj-i", "adjective-na":"Adj-na", "adverb":"Adv", "particle":"Part", "conjunction":"Conj", "expression":"Gram" };

    card.innerHTML = `
      <div class="card-head">
        <span class="tag lvl-tag">${item.level}</span>
        <span class="tag">${posMap[item.pos] || item.pos}</span>
        <small style="margin-left:auto;color:var(--muted)">${item.id || ''}</small>
      </div>
      <span class="ja">${item.ja}</span>
      <span class="kana">${item.kana || ''}</span>
      <span class="en">${item.en}</span>
      ${audioBtn}${ex}
    `;
    listEl.appendChild(card);
  });
}

// 4. イベント
document.getElementById('posChips').addEventListener('click', e => {
  if (e.target.classList.contains('chip')) {
    document.querySelectorAll('.chip').forEach(c => c.classList.remove('active'));
    e.target.classList.add('active');
    performSearch();
  }
});

let timer;
document.getElementById('kw').addEventListener('input', () => {
  clearTimeout(timer);
  timer = setTimeout(performSearch, 300);
});

// Start
initDictionary();
</script>
</body>
</html>
