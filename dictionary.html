<script>
let allVocab = [];
const audioUrl = "https://nihongotext.com/inquiry/index.html";

async function initDictionary() {
  const levels = ['n5', 'n4', 'n3', 'n2', 'n1'];
  const fetches = levels.map(async lv => {
    try {
      // N5の読み込みファイルを n5_master_cleaned.json に指定
      const fileName = lv === 'n5' ? 'n5_master_cleaned.json' : `${lv}_master_cleaned.json`;
      const res = await fetch(`data/json/${fileName}`);
      if (!res.ok) return [];
      const data = await res.json();
      return data.map(d => ({ ...d, level: lv.toUpperCase() }));
    } catch (e) { return []; }
  });
  const results = await Promise.all(fetches);
  allVocab = results.flat();
  document.getElementById('status').innerText = `${allVocab.length} words loaded.`;
  performSearch();
}

function performSearch() {
  const kw = document.getElementById('kw').value.toLowerCase().trim();
  const posFilter = document.querySelector('.chip.active').getAttribute('data-pos');
  const filtered = allVocab.filter(item => {
    const matchPos = (posFilter === 'all' || item.pos === posFilter);
    // 検索対象にローマ字(item.ro)も含めるように強化
    const matchKw = !kw || 
                    item.ja.includes(kw) || 
                    item.kana.includes(kw) || 
                    (item.ro && item.ro.toLowerCase().includes(kw)) || 
                    item.en.toLowerCase().includes(kw);
    return matchPos && matchKw;
  });
  render(filtered);
}

function render(data) {
  const listEl = document.getElementById('list');
  listEl.innerHTML = data.length === 0 ? '<p>No matches found.</p>' : '';
  
  data.slice(0, 300).forEach(item => {
    const card = document.createElement('div');
    card.className = 'card';
    
    const audioBtn = `<a href="${audioUrl}" target="_blank" class="audio-link"><i class="fa-solid fa-circle-play"></i> Audio Request</a>`;
    
    // 例文（examples）の表示処理
    let exHtml = "";
    if (item.examples && item.examples.length > 0) {
      exHtml = `<details class="example-details"><summary>Examples (${item.examples.length})</summary><div class="example-list">`;
      exHtml += item.examples.map(ex => `
        <div class="ex-item">
          <span class="ex-ja">${ex.ja}</span>
          <span class="ex-kana">${ex.kana || ''}</span>
          <span class="ex-ro">${ex.ro || ''}</span>
          <span class="ex-en">${ex.en}</span>
          ${audioBtn}
        </div>
      `).join('');
      exHtml += `</div></details>`;
    }

    const posMap = { "noun":"Noun", "verb":"Verb", "adjective-i":"Adj-i", "adjective-na":"Adj-na", "adverb":"Adv", "expression":"Gram" };
    
    // カード全体の組み立て（kanaとroを表示）
    card.innerHTML = `
      <div class="card-head">
        <span class="tag lvl-tag">${item.level}</span>
        <span class="tag">${posMap[item.pos] || item.pos}</span>
      </div>
      <span class="ja">${item.ja}</span>
      <span class="kana">${item.kana || ''}</span>
      <span class="ro">${item.ro || ''}</span>
      <span class="en">${item.en}</span>
      ${audioBtn}
      ${exHtml}
    `;
    listEl.appendChild(card);
  });
}

document.getElementById('posChips').addEventListener('click', e => {
  if (e.target.classList.contains('chip')) {
    document.querySelectorAll('.chip').forEach(c => c.classList.remove('active'));
    e.target.classList.add('active');
    performSearch();
  }
});

document.getElementById('kw').addEventListener('input', performSearch);
initDictionary();
</script>
