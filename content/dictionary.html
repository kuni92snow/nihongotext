<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>Vocabulary Tool - nihongotext.com</title>
<link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet">
<script async src="https://www.googletagmanager.com/gtag/js?id=G-9QSHWJE0HZ"></script>
<script>
  window.dataLayer = window.dataLayer || [];
  function gtag(){dataLayer.push(arguments);}
  gtag('js', new Date());
  gtag('config', 'G-9QSHWJE0HZ');
</script>
<style>
:root{ --shu:#e6462d; --shu-tint:#fff2ef; --ink:#1f2937; --muted:#6b7280; --line:#e5e7eb; --card:#fff7f6; }
*{box-sizing:border-box}
body{ margin:0; background:#fff; color:var(--ink); font:16px/1.65 system-ui,-apple-system,sans-serif; text-align:center; }
.wrap{ max-width:1000px; margin:0 auto; padding:0 20px }
.site-header{ border-top:4px solid var(--shu); border-bottom:1px solid var(--line); background:#fff; padding:30px 0 }
.site-header-inner{ display:flex; flex-direction:column; align-items:center; gap:12px }
.logo-link{ text-decoration:none; display:flex; align-items:center; gap:2px; }
.logo-text{ font-weight:900; font-size:32px; color:var(--shu) }
.nav-links { display:flex; gap:15px; flex-wrap:wrap; justify-content:center; margin-top:5px }
.nav-links a { color:var(--ink); font-weight:700; text-decoration:none; font-size:14px; transition:0.2s }
.hero-section { background: var(--shu-tint); padding: 50px 0; border-radius: 0 0 40px 40px; }
.hero-section h1 { color: var(--shu); font-size: 32px; font-weight: 800; margin: 0; }
.dictionary-main{ padding:50px 0; min-height:50vh; text-align: left; }
.search-box{ background:#f9fafb; border:1px solid var(--line); border-radius:12px; padding:25px; margin:-40px 0 40px; position:relative; z-index:10; box-shadow:0 4px 15px rgba(0,0,0,0.05) }
input#kw{ width:100%; padding:16px; border:1px solid var(--line); border-radius:8px; font-size:18px; outline:none; text-align:center }
.chips{ display:flex; flex-wrap:wrap; gap:8px; margin-top:18px; justify-content:center }
.chip{ padding:8px 16px; border-radius:20px; background:#fff; border:1px solid var(--line); font-size:13px; font-weight:600; cursor:pointer; color:var(--muted) }
.chip.active{ background:var(--shu); border-color:var(--shu); color:#fff }
#list{ display:grid; gap:20px }
.card{ background:var(--card); border:1px solid #ffe4e1; border-radius:15px; padding:25px; transition:0.2s; position:relative }
.card:hover{ transform:translateY(-2px); box-shadow:0 6px 20px rgba(0,0,0,0.05) }
.tag{ font-size:11px; font-weight:700; background:var(--shu-tint); color:var(--shu); padding:4px 10px; border-radius:4px; text-transform:uppercase; margin-right:6px }
.lvl-tag{ background:var(--ink); color:#fff }
.ja{ display:block; font-size:26px; font-weight:800; margin:10px 0 4px; color:var(--ink) }
.kana{ display:block; font-size:15px; color:var(--muted); margin-bottom:12px; font-weight:500 }
.en{ display:block; font-size:17px; color:var(--ink); font-weight:600; margin-bottom:15px }
.audio-btn { border:none; background:none; cursor:pointer; color:var(--shu); font-size:18px; margin-left:10px; }
.example-details { border-top:1px solid #ffe4e1; margin-top:15px; padding-top:15px }
.example-details summary { font-size:14px; color:var(--shu); cursor:pointer; font-weight:700; }
.ex-item { font-size:15px; background:#fff; padding:12px; border-radius:8px; border:1px solid #fff1f0; margin-top:10px }
.site-footer{ border-top:1px solid var(--line); padding:50px 0; background:#fff; margin-top:80px; text-align: center; }
</style>
</head>
<body>

<header class="site-header">
  <div class="wrap site-header-inner">
    <a href="/" class="logo-link"><span class="logo-text">nihongotext</span><span style="color:#333;">.com</span></a>
    <nav class="nav-links">
      <a href="/">Home</a>
      <a href="/content/dictionary.html" style="color:var(--shu);">Vocabulary</a>
      <a href="/quiz/index.html">Quiz</a>
      <a href="/inquiry/index.html">Inquiry</a>
    </nav>
  </div>
</header>

<div class="hero-section">
  <div class="wrap"><h1>Vocabulary Tool</h1></div>
</div>

<main class="wrap dictionary-main">
  <div class="search-box">
    <input type="text" id="kw" placeholder="Type a word..." autocomplete="off">
    <div class="chips" id="posChips">
      <span class="chip active" data-pos="all">All</span>
      <span class="chip" data-pos="noun">Noun</span>
      <span class="chip" data-pos="verb">Verb</span>
    </div>
  </div>
  <div id="status" style="font-size:13px; color:var(--muted); margin-bottom:15px; font-weight:600; text-align: center;">Loading...</div>
  <div id="list"></div>
</main>

<footer class="site-footer"><div class="footer-copy">© <span id="ft-year"></span> nihongotext.com</div></footer>

<script>
let allVocab = [];
async function initDictionary() {
  const urlParams = new URLSearchParams(window.location.search);
  const queryKw = urlParams.get('kw');
  if (queryKw) document.getElementById('kw').value = decodeURIComponent(queryKw);

  const levels = ['n5', 'n4', 'n3', 'n2', 'n1'];
  const fetches = levels.map(async lv => {
    try {
      const res = await fetch(`/data/json/${lv}_master_cleaned.json`);
      if (!res.ok) return [];
      const data = await res.json();
      return data.map(d => ({ ...d, level: lv.toUpperCase() }));
    } catch (e) { return []; }
  });
  const results = await Promise.all(fetches);
  allVocab = results.flat();
  document.getElementById('status').innerText = `${allVocab.length} words loaded.`;
  performSearch();
}

function performSearch() {
  const kw = document.getElementById('kw').value.toLowerCase().trim();
  const posFilter = document.querySelector('.chip.active').getAttribute('data-pos');
  const filtered = allVocab.filter(item => {
    const mPos = (posFilter === 'all' || item.pos === posFilter);
    const mKw = !kw || (item.ja.includes(kw) || item.kana.includes(kw) || item.en.toLowerCase().includes(kw));
    return mPos && mKw;
  });
  render(filtered);
}

function render(data) {
  const listEl = document.getElementById('list'); listEl.innerHTML = '';
  data.slice(0, 10).forEach(item => {
    const card = document.createElement('div'); card.className = 'card';
    const audioPath = `/assets/audio/${item.audio}`;
    const inquiryUrl = `/inquiry/index.html?subject=${encodeURIComponent('音声依頼（' + item.ja + '）')}`;
    const audioHtml = `<button onclick="playAudio('${audioPath}', '${inquiryUrl}')" class="audio-btn"><i class="fa-solid fa-volume-high"></i></button>`;

    let exHtml = (item.examples || []).map(ex => `<div class="ex-item"><strong>${ex.ja}</strong><br><small>${ex.kana}</small><br><div>${ex.en}</div></div>`).join('');
    card.innerHTML = `<div class="card-head"><span class="tag lvl-tag">${item.level}</span><span class="tag">${item.pos}</span>${audioHtml}</div>
      <span class="ja">${item.ja}</span><span class="kana">${item.kana}</span><span class="en">${item.en}</span>
      ${exHtml ? `<details class="example-details"><summary>▶ Example Sentences</summary><div class="example-list">${exHtml}</div></details>` : ''}`;
    listEl.appendChild(card);
  });
}

function playAudio(path, fallbackUrl) {
  const audio = new Audio(path);
  audio.play().catch(() => { if(confirm("Audio not found. Request it?")) window.location.href = fallbackUrl; });
}

document.getElementById('posChips').addEventListener('click', e => { if (e.target.classList.contains('chip')) { document.querySelectorAll('.chip').forEach(c => c.classList.remove('active')); e.target.classList.add('active'); performSearch(); } });
document.getElementById('kw').addEventListener('input', performSearch);
document.addEventListener('DOMContentLoaded', () => { document.getElementById('ft-year').textContent = new Date().getFullYear(); initDictionary(); });
</script>
</body>
</html>
