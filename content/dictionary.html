<style>
/* --- Colors & Base Styles --- */
:root{ --shu:#e6462d; --shu-tint:#fff2ef; --ink:#1f2937; --muted:#6b7280; --line:#e5e7eb; --card:#fff7f6; }
*{box-sizing:border-box}
body{ margin:0; background:#fff; color:var(--ink); font:16px/1.65 system-ui,-apple-system,sans-serif; text-align:center; }
.wrap{ max-width:1000px; margin:0 auto; padding:0 20px }

/* --- Site Header --- */
.site-header{ border-top:4px solid var(--shu); border-bottom:1px solid var(--line); background:#fff; padding:30px 0 }
.site-header-inner{ display:flex; flex-direction:column; align-items:center; gap:12px }
.logo-link{ text-decoration:none; display:flex; align-items:center; gap:2px; }
.logo-text{ font-weight:900; font-size:32px; color:var(--shu) }
.nav-links, .sns-nav { display:flex; gap:15px; flex-wrap:wrap; justify-content:center; margin-top:5px }
.nav-links a { color:var(--ink); font-weight:700; text-decoration:none; font-size:14px; transition:0.2s }
.nav-links a:hover { color:var(--shu) }
.sns-nav a { color:var(--muted); font-size:18px; text-decoration:none; transition:0.2s }
.sns-nav a:hover { color:var(--shu) }

/* --- Hero Section --- */
.hero-section { background: var(--shu-tint); padding: 50px 0; border-radius: 0 0 40px 40px; }
.hero-section h1 { color: var(--shu); font-size: 32px; font-weight: 800; margin: 0 0 10px; }
.hero-section p { color: var(--muted); margin: 0; font-weight: 500; }

/* --- Search UI --- */
.dictionary-main{ padding:50px 0; min-height:50vh; text-align: left; }
.search-box{ 
  background:#f9fafb; border:1px solid var(--line); border-radius:15px; padding:40px; 
  margin:-40px 0 40px; position:relative; z-index:10; box-shadow:0 4px 15px rgba(0,0,0,0.05) 
}
input#kw{ width:100%; padding:20px; border:1px solid var(--line); border-radius:12px; font-size:20px; outline:none; background:#fff; text-align:center; transition:0.2s; }
input#kw:focus{ border-color:var(--shu); box-shadow: 0 0 0 4px rgba(230,70,45,0.1); }

.chips{ display:flex; flex-wrap:wrap; gap:10px; margin-top:30px; justify-content:center }
.chip{ padding:10px 20px; border-radius:30px; background:#fff; border:1px solid var(--line); font-size:14px; font-weight:700; cursor:pointer; transition:0.2s; color:var(--muted) }
.chip:hover { border-color: var(--shu); color: var(--shu); }
.chip.active{ background:var(--shu); border-color:var(--shu); color:#fff }

/* --- Card List --- */
#list{ display:grid; gap:25px }
.card{ background:var(--card); border:1px solid #ffe4e1; border-radius:15px; padding:30px; transition:0.2s; position:relative }
.card:hover{ transform:translateY(-2px); box-shadow:0 8px 25px rgba(0,0,0,0.06) }

.card-head{ display:flex; justify-content:space-between; align-items:center; margin-bottom:15px; }
.tag-group{ display:flex; gap:8px; }
.tag{ font-size:12px; font-weight:800; background:rgba(230,70,45,0.1); color:var(--shu); padding:5px 12px; border-radius:6px; text-transform:uppercase; }
.lvl-tag{ background:var(--ink); color:#fff }

.ja{ display:block; font-size:30px; font-weight:900; margin-bottom:5px; color:var(--ink) }
.kana-ro{ display:block; font-size:16px; color:var(--muted); margin-bottom:15px; font-weight:600; line-height:1.4 }
.en{ display:block; font-size:19px; color:var(--ink); font-weight:700; margin-bottom:20px }

.audio-btn { border:none; background:none; cursor:pointer; color:var(--shu); font-size:22px; transition:0.2s; padding:8px; border-radius:50%; }
.audio-btn:hover { background: var(--shu-tint); transform: scale(1.1); }

/* --- Examples --- */
.example-details { border-top:1px solid #f1cbc6; margin-top:20px; padding-top:20px }
.example-details summary { font-size:15px; color:var(--shu); cursor:pointer; font-weight:800; display:flex; align-items:center; gap:10px; list-style:none; }
.example-details summary::-webkit-details-marker { display:none; }
.ex-list { margin-top:15px; display:grid; gap:15px; }
.ex-item { font-size:15px; background:#fff; padding:18px; border-radius:12px; border:1px solid #fff1f0; position:relative; }

.ex-ja-row { display:flex; justify-content:space-between; align-items:flex-start; gap:10px; margin-bottom:5px; }
.ex-ja { font-weight:800; color:var(--ink); font-size:17px; line-height:1.4; }
.ex-kana-ro { font-size:13px; color:var(--muted); display:block; margin-bottom:8px; font-weight:600; }
.ex-en { font-weight:700; color:var(--ink); font-size:15px; display:block; }

/* --- Footer --- */
.site-footer{ border-top:1px solid var(--line); padding:60px 0; background:#fff; margin-top:80px; text-align: center; }
.footer-inner{ display:flex; flex-direction:column; align-items:center; gap:25px }
.footer-copy{ font-size:14px; color:var(--muted); font-weight:600 }
</style>
</head>
<body>

<header class="site-header">
  <div class="wrap site-header-inner">
    <a href="/" class="logo-link"><span class="logo-text">nihongotext</span><span style="font-weight:800;font-size:32px;color:#333;">.com</span></a>
    <div style="font-size:11px; font-weight:700; color:var(--muted); letter-spacing:1px; text-transform:uppercase; margin-top:-5px">== beta version ==</div>
    <nav class="nav-links">
      <a href="/">Home</a>
      <a href="/content/dictionary.html" style="color:var(--shu);">Vocabulary Tool</a>
      <a href="/quiz/index.html">Quiz</a>
      <a href="/blog/index.html">Blog</a>
      <a href="/inquiry/index.html">Inquiry</a>
    </nav>
    <nav class="sns-nav">
      <a href="https://x.com/nihongotext_com" target="_blank" rel="noopener"><i class="fa-brands fa-x-twitter"></i></a>
      <a href="https://www.reddit.com/user/nihongotext_com/" target="_blank" rel="noopener"><i class="fa-brands fa-reddit-alien"></i></a>
      <a href="https://medium.com/@nihongotext.com" target="_blank" rel="noopener"><i class="fa-brands fa-medium"></i></a>
      <a href="https://ko-fi.com/nihongotext" target="_blank" rel="noopener"><i class="fa-solid fa-mug-hot"></i></a>
      <a href="https://nihongotextcom.substack.com/subscribe" target="_blank" rel="noopener"><i class="fa-solid fa-newspaper"></i></a>
    </nav>
  </div>
</header>

<div class="hero-section">
  <div class="wrap">
    <h1>Vocabulary Tool</h1>
    <p>Search over 4,000 words with full Romaji, and will add audio support.</p>
  </div>
</div>

<main class="wrap dictionary-main">
  <div class="search-box">
    <input type="text" id="kw" placeholder="Type to search (English, Kanji, or Kana)..." autocomplete="off">
    <div class="chips" id="posChips">
      <span class="chip active" data-pos="all">All</span>
      <span class="chip" data-pos="noun">Noun</span>
      <span class="chip" data-pos="verb">Verb</span>
      <span class="chip" data-pos="adjective-i">Adj-i</span>
      <span class="chip" data-pos="adjective-na">Adj-na</span>
      <span class="chip" data-pos="adverb">Adverb</span>
      <span class="chip" data-pos="expression">Expression</span>
      <span class="chip" data-pos="particle">Particle</span>
    </div>
  </div>
  
  <div id="status" style="font-size:13px; color:var(--muted); margin-bottom:20px; font-weight:800; text-align: center;"></div>
  <div id="list"></div>
</main>

<footer class="site-footer">
  <div class="wrap footer-inner">
    <div class="footer-copy">© <span id="ft-year"></span> nihongotext.com</div>
    <nav class="sns-nav">
      <a href="https://x.com/nihongotext_com" target="_blank" rel="noopener"><i class="fa-brands fa-x-twitter"></i></a>
      <a href="https://www.reddit.com/user/nihongotext_com/" target="_blank" rel="noopener"><i class="fa-brands fa-reddit-alien"></i></a>
      <a href="https://medium.com/@nihongotext.com" target="_blank" rel="noopener"><i class="fa-brands fa-medium"></i></a>
      <a href="https://ko-fi.com/nihongotext" target="_blank" rel="noopener"><i class="fa-solid fa-mug-hot"></i></a>
      <a href="https://nihongotextcom.substack.com/subscribe" target="_blank" rel="noopener"><i class="fa-solid fa-newspaper"></i></a>
    </nav>
  </div>
</footer>

<script>
let allVocab = [];

async function initDictionary() {
  document.getElementById('ft-year').textContent = new Date().getFullYear();
  const urlParams = new URLSearchParams(window.location.search);
  const queryKw = urlParams.get('kw');
  if (queryKw) document.getElementById('kw').value = decodeURIComponent(queryKw);

  const levels = ['n5', 'n4', 'n3', 'n2', 'n1']; 
  const fetches = levels.map(async lv => {
    try {
      const res = await fetch(`/data/json/${lv}_master_cleaned.json`);
      if (!res.ok) return [];
      const data = await res.json();
      return data.map(d => ({ ...d, level: lv.toUpperCase() }));
    } catch (e) { return []; }
  });

  const results = await Promise.all(fetches);
  allVocab = results.flat();
  document.getElementById('status').innerText = `${allVocab.length.toLocaleString()} words loaded.`;
  performSearch();
}

function performSearch() {
  const kw = document.getElementById('kw').value.toLowerCase().trim();
  const posFilter = document.querySelector('.chip.active').getAttribute('data-pos');
  const filtered = allVocab.filter(item => {
    const mPos = (posFilter === 'all' || item.pos === posFilter);
    const mKw = !kw || (
      (item.ja && item.ja.includes(kw)) || 
      (item.kana && item.kana.includes(kw)) || 
      (item.en && item.en.toLowerCase().includes(kw))
    );
    return mPos && mKw;
  });
  render(filtered);
}

function render(data) {
  const listEl = document.getElementById('list');
  listEl.innerHTML = data.length ? '' : '<p style="text-align:center; padding:50px; color:var(--muted); font-weight:800;">No matches found.</p>';
  
  data.slice(0, 30).forEach(item => {
    const card = document.createElement('div');
    card.className = 'card';

    const mainAudio = `/assets/audio/${item.audio}`;
    const inquiryUrl = `/inquiry/index.html?subject=${encodeURIComponent('音声依頼（' + item.ja + '）')}`;

    // 例文セクションの構築
    let exHtml = "";
    if (item.examples && item.examples.length > 0) {
      const exItems = item.examples.map(ex => {
        const exAudio = `/assets/audio/${ex.audio}`;
        return `
          <div class="ex-item">
            <div class="ex-ja-row">
              <span class="ex-ja">${ex.ja}</span>
              <button onclick="playAudio('${exAudio}', '${inquiryUrl}')" class="audio-btn" style="font-size:16px;">
                <i class="fa-solid fa-volume-high"></i>
              </button>
            </div>
            <span class="ex-kana-ro">${ex.kana} / <span style="font-style:italic;">${ex.ro}</span></span>
            <span class="ex-en">${ex.en}</span>
          </div>
        `;
      }).join('');
      
      exHtml = `
        <details class="example-details">
          <summary><i class="fa-solid fa-circle-chevron-right"></i> Example Sentences</summary>
          <div class="ex-list">${exItems}</div>
        </details>
      `;
    }

    card.innerHTML = `
      <div class="card-head">
        <div class="tag-group">
          <span class="tag lvl-tag">${item.level}</span>
          <span class="tag">${item.pos}</span>
        </div>
        <button onclick="playAudio('${mainAudio}', '${inquiryUrl}')" class="audio-btn">
          <i class="fa-solid fa-volume-high"></i>
        </button>
      </div>
      <span class="ja">${item.ja}</span>
      <span class="kana-ro">${item.kana} / <span style="font-style:italic; font-weight:normal;">${item.ro}</span></span>
      <span class="en">${item.en}</span>
      ${exHtml}
    `;
    listEl.appendChild(card);
  });
}

function playAudio(path, fallbackUrl) {
  const audio = new Audio(path);
  audio.play().catch(() => {
    if(confirm("Audio file not found. Would you like to request audio?")) {
      window.location.href = fallbackUrl;
    }
  });
}

document.getElementById('posChips').addEventListener('click', e => {
  if (e.target.classList.contains('chip')) {
    document.querySelectorAll('.chip').forEach(c => c.classList.remove('active'));
    e.target.classList.add('active');
    performSearch();
  }
});

document.getElementById('kw').addEventListener('input', performSearch);
initDictionary();
</script>
</body>
</html>
