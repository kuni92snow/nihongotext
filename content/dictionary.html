<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>Vocabulary Tool - nihongotext.com</title>
<link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet">
<script async src="https://www.googletagmanager.com/gtag/js?id=G-9QSHWJE0HZ"></script>
<script>
  window.dataLayer = window.dataLayer || [];
  function gtag(){dataLayer.push(arguments);}
  gtag('js', new Date());
  gtag('config', 'G-9QSHWJE0HZ');

<style>
:root{ --shu:#e6462d; --shu-tint:#fff2ef; --ink:#1f2937; --muted:#6b7280; --line:#e5e7eb; --card:#fff7f6; }
*{box-sizing:border-box}
body{ margin:0; background:#fff; color:var(--ink); font:16px/1.65 system-ui,-apple-system,sans-serif; text-align:center; }
.wrap{ max-width:1000px; margin:0 auto; padding:0 20px }
.site-header{ border-top:4px solid var(--shu); border-bottom:1px solid var(--line); background:#fff; padding:30px 0 }
.site-header-inner{ display:flex; flex-direction:column; align-items:center; gap:12px }
.logo-link{ text-decoration:none; display:flex; align-items:center; gap:2px; }
.logo-text{ font-weight:900; font-size:32px; color:var(--shu) }
.nav-links, .sns-nav { display:flex; gap:15px; flex-wrap:wrap; justify-content:center; margin-top:5px }
.nav-links a { color:var(--ink); font-weight:700; text-decoration:none; font-size:14px; transition:0.2s }
.sns-nav a { color:var(--muted); font-size:18px; text-decoration:none; transition:0.2s }
.sns-nav a:hover { color:var(--shu) }
.hero-section { background: var(--shu-tint); padding: 50px 0; border-radius: 0 0 40px 40px; }
.hero-section h1 { color: var(--shu); font-size: 32px; font-weight: 800; margin: 0; }
.dictionary-main{ padding:50px 0; min-height:50vh; text-align: left; }
.search-box{ background:#f9fafb; border:1px solid var(--line); border-radius:12px; padding:25px; margin:-40px 0 40px; position:relative; box-shadow:0 4px 15px rgba(0,0,0,0.05) }
input#kw{ width:100%; padding:16px; border:1px solid var(--line); border-radius:8px; font-size:18px; outline:none; text-align:center }
.chip{ padding:8px 16px; border-radius:20px; background:#fff; border:1px solid var(--line); font-size:13px; font-weight:600; cursor:pointer; margin:4px; color:var(--muted) }
.chip.active{ background:var(--shu); color:#fff; border-color:var(--shu) }
#list{ display:grid; gap:20px }
.card{ background:var(--card); border:1px solid #ffe4e1; border-radius:15px; padding:25px; position:relative }
.ja{ display:block; font-size:26px; font-weight:800; color:var(--ink) }
.audio-btn { border:none; background:none; cursor:pointer; color:var(--shu); font-size:20px; margin-left:10px; }
.site-footer{ border-top:1px solid var(--line); padding:50px 0; background:#fff; margin-top:80px; text-align: center; }
.footer-inner{ display:flex; flex-direction:column; align-items:center; gap:20px }
</style>
</head>
<body>

<header class="site-header">
  <div class="wrap site-header-inner">
    <a href="/" class="logo-link"><span class="logo-text">nihongotext</span><span style="color:#333;">.com</span></a>
    <nav class="nav-links"><a href="/">Home</a><a href="/content/dictionary.html" style="color:var(--shu);">Vocabulary</a><a href="/quiz/index.html">Quiz</a><a href="/inquiry/index.html">Inquiry</a></nav>
    <nav class="sns-nav">
      <a href="https://x.com/nihongotext_com" target="_blank"><i class="fa-brands fa-x-twitter"></i></a>
      <a href="https://www.reddit.com/user/nihongotext_com/" target="_blank"><i class="fa-brands fa-reddit-alien"></i></a>
      <a href="https://medium.com/@nihongotext.com" target="_blank"><i class="fa-brands fa-medium"></i></a>
      <a href="https://ko-fi.com/nihongotext" target="_blank"><i class="fa-solid fa-mug-hot"></i></a>
      <a href="https://nihongotextcom.substack.com/subscribe" target="_blank"><i class="fa-solid fa-newspaper"></i></a>
    </nav>
  </div>
</header>

<div class="hero-section"><div class="wrap"><h1>Vocabulary Tool</h1></div></div>

<main class="wrap dictionary-main">
  <div class="search-box">
    <input type="text" id="kw" placeholder="Search a word..." autocomplete="off">
    <div class="chips" id="posChips"><span class="chip active" data-pos="all">All</span><span class="chip" data-pos="noun">Noun</span><span class="chip" data-pos="verb">Verb</span></div>
  </div>
  <div id="status" style="font-size:13px; text-align: center; color:var(--muted);"></div>
  <div id="list"></div>
</main>

<footer class="site-footer">
  <div class="wrap footer-inner">
    <div class="footer-copy">© <span id="ft-year"></span> nihongotext.com</div>
    <nav class="sns-nav">
      <a href="https://x.com/nihongotext_com" target="_blank"><i class="fa-brands fa-x-twitter"></i></a>
      <a href="https://www.reddit.com/user/nihongotext_com/" target="_blank"><i class="fa-brands fa-reddit-alien"></i></a>
      <a href="https://medium.com/@nihongotext.com" target="_blank"><i class="fa-brands fa-medium"></i></a>
      <a href="https://ko-fi.com/nihongotext" target="_blank"><i class="fa-solid fa-mug-hot"></i></a>
      <a href="https://nihongotextcom.substack.com/subscribe" target="_blank"><i class="fa-solid fa-newspaper"></i></a>
    </nav>
  </div>
</footer>

<script>
let allVocab = [];
async function init() {
  const urlParams = new URLSearchParams(window.location.search);
  const kw = urlParams.get('kw'); if(kw) document.getElementById('kw').value = decodeURIComponent(kw);
  const levels = ['n5','n4','n3','n2','n1'];
  const res = await Promise.all(levels.map(async lv => {
    try { const r = await fetch(`/data/json/${lv}_master_cleaned.json`); return r.ok ? (await r.json()).map(d=>({...d,lv:lv.toUpperCase()})) : []; } catch(e){return [];}
  }));
  allVocab = res.flat(); document.getElementById('status').innerText = allVocab.length + " words loaded."; performSearch();
}
function performSearch() {
  const kw = document.getElementById('kw').value.toLowerCase().trim();
  const pos = document.querySelector('.chip.active').getAttribute('data-pos');
  const filtered = allVocab.filter(i => (pos==='all'||i.pos===pos) && (i.ja.includes(kw)||i.kana.includes(kw)||i.en.toLowerCase().includes(kw)));
  render(filtered);
}
function render(data) {
  const list = document.getElementById('list'); list.innerHTML = '';
  data.slice(0,15).forEach(i => {
    const audioUrl = `/assets/audio/${i.audio}`;
    const inquiry = `/inquiry/index.html?subject=${encodeURIComponent('音声依頼（'+i.ja+'）')}`;
    const card = document.createElement('div'); card.className='card';
    card.innerHTML = `<div><span class="ja">${i.ja}</span> <button onclick="playAudio('${audioUrl}','${inquiry}')" class="audio-btn"><i class="fa-solid fa-volume-high"></i></button></div><div style="font-size:14px; color:var(--muted)">${i.kana}</div><div style="font-weight:600; margin-top:10px">${i.en}</div>`;
    list.appendChild(card);
  });
}
function playAudio(path, fallback) {
  const a = new Audio(path); a.play().catch(() => { if(confirm("Audio file not found. Would you like to request it?")) window.location.href = fallback; });
}
document.getElementById('kw').addEventListener('input', performSearch);
document.getElementById('posChips').addEventListener('click', e => { if(e.target.classList.contains('chip')){ document.querySelectorAll('.chip').forEach(c=>c.classList.remove('active')); e.target.classList.add('active'); performSearch(); } });
document.addEventListener('DOMContentLoaded', () => { document.getElementById('ft-year').textContent = new Date().getFullYear(); init(); });
</script>
</body>
</html>
