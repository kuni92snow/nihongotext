<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>Dictionary - nihongotext.com</title>
<link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet">
<script async src="https://www.googletagmanager.com/gtag/js?id=G-9QSHWJE0HZ"></script>
<script>
  window.dataLayer = window.dataLayer || [];
  function gtag(){dataLayer.push(arguments);}
  gtag('js', new Date());
  gtag('config', 'G-9QSHWJE0HZ');
</script>
<style>
/* ==========================================
   ★ ヘッダー・フッターの「見た目(色など)」の修正場所
   ========================================== */
:root{ --shu:#e6462d; --shu-tint:#fff2ef; --ink:#1f2937; --muted:#6b7280; --line:#e5e7eb; --card:#fff7f6; }
*{box-sizing:border-box}
body{ margin:0; background:#fff; color:var(--ink); font:16px/1.65 system-ui,-apple-system,sans-serif }
.wrap{ max-width:800px; margin:0 auto; padding:0 16px }

/* ヘッダーのスタイル */
.topbar{ border-top:4px solid var(--shu); border-bottom:1px solid var(--shu-tint); padding:20px 0 }
.brand{ font-weight:900; font-size:32px; color:var(--shu); text-align:center; display:block; text-decoration:none }
nav{ display:flex; justify-content:center; gap:15px; margin-top:10px }
nav a{ color:var(--ink); font-weight:600; text-decoration:none; font-size:14px }

/* フッターのスタイル */
.footer{ border-top:1px solid var(--shu-tint); padding:20px 0; text-align:center; color:var(--muted); font-size:12px; margin-top:40px }

/* 辞書ツールの中身 */
.dictionary-main{ padding:30px 0; min-height:60vh }
.search-box{ background:#f9fafb; border:1px solid var(--line); border-radius:12px; padding:20px; margin:20px 0 30px }
input#kw{ width:100%; padding:14px; border:1px solid var(--line); border-radius:8px; font-size:18px; outline:none; border:1px solid var(--line); background:#fff; }
.chips{ display:flex; flex-wrap:wrap; gap:8px; margin-top:15px }
.chip{ padding:6px 14px; border-radius:20px; background:#fff; border:1px solid var(--line); font-size:13px; cursor:pointer; transition:0.2s }
.chip.active{ background:var(--shu); border-color:var(--shu); color:#fff; font-weight:600 }
#list{ display:grid; gap:16px }
.card{ background:var(--card); border:1px solid #ffe4e1; border-radius:12px; padding:20px }
.tag{ font-size:11px; font-weight:700; background:var(--shu-tint); color:var(--shu); padding:3px 8px; border-radius:4px; text-transform:uppercase; margin-right:4px }
.lvl-tag{ background:var(--ink); color:#fff }
.ja{ display:block; font-size:24px; font-weight:800; margin-bottom:4px }
.kana{ display:block; font-size:14px; color:var(--muted); margin-bottom:10px }
.en{ display:block; font-size:16px; color:var(--ink); font-weight:500; margin-bottom:15px }
.ex-item{ font-size:15px; background:#fff; padding:12px; border-radius:8px; border:1px solid #fff1f0; margin-top:8px }
</style>
</head>
<body>

<div class="topbar"><div class="wrap">
  <a href="/" class="brand">nihongotext<span style="color:var(--ink)">.com</span></a>
  <nav>
    <a href="/">Home</a>
    <a href="/content/dictionary.html" style="color:var(--shu)">Dictionary</a>
    <a href="/quiz/index.html">Quiz</a>
    <a href="/inquiry/">Inquiry</a>
  </nav>
</div></div>

<main class="wrap dictionary-main">
  <h2>Japanese Dictionary</h2>
  <div class="search-box">
    <input type="text" id="kw" placeholder="Search word, kana, or English..." autocomplete="off">
    <div class="chips" id="posChips">
      <span class="chip active" data-pos="all">すべて (All)</span>
      <span class="chip" data-pos="noun">名詞 (Noun)</span>
      <span class="chip" data-pos="verb">動詞 (Verb)</span>
      <span class="chip" data-pos="adjective-i">い形容詞 (Adj-i)</span>
      <span class="chip" data-pos="adjective-na">な形容詞 (Adj-na)</span>
    </div>
  </div>
  <div id="status" style="font-size:13px; color:var(--muted); margin-bottom:10px;">Loading database...</div>
  <div id="list"></div>
</main>

<footer class="footer"><div class="wrap">© 2026 nihongotext.com</div></footer>

<script>
let allVocab = [];
async function initDictionary() {
  const levels = ['n5', 'n4', 'n3', 'n2', 'n1']; 
  const fetches = levels.map(async lv => {
    try {
      const res = await fetch(`/data/json/${lv}_master_cleaned.json`);
      if (!res.ok) return [];
      const data = await res.json();
      return data.map(d => ({ ...d, level: lv.toUpperCase() }));
    } catch (e) { return []; }
  });

  const results = await Promise.all(fetches);
  allVocab = results.flat();
  document.getElementById('status').innerText = `${allVocab.length} words loaded.`;
  performSearch();
}

function performSearch() {
  const kw = document.getElementById('kw').value.toLowerCase().trim();
  const posFilter = document.querySelector('.chip.active').getAttribute('data-pos');
  const filtered = allVocab.filter(item => {
    const mPos = (posFilter === 'all' || item.pos === posFilter);
    const mKw = !kw || (
      (item.ja && item.ja.includes(kw)) || 
      (item.kana && item.kana.includes(kw)) || 
      (item.en && item.en.toLowerCase().includes(kw))
    );
    return mPos && mKw;
  });
  render(filtered);
}

function render(data) {
  const listEl = document.getElementById('list');
  listEl.innerHTML = data.length ? '' : '<p>No matches found.</p>';
  
  /* ★ 表示数を 5個 に制限しました ★ */
  data.slice(0, 5).forEach(item => {
    const card = document.createElement('div');
    card.className = 'card';
    let exHtml = (item.examples || []).map(ex => `
      <div class="ex-item">
        <strong>${ex.ja}</strong><br>
        <small>${ex.kana || ''}</small><br>
        <small><i>${ex.ro || ''}</i></small><br>
        ${ex.en}
      </div>`).join('');
    card.innerHTML = `
      <div class="card-head"><span class="tag lvl-tag">${item.level}</span><span class="tag">${item.pos}</span></div>
      <span class="ja">${item.ja}</span><span class="kana">${item.kana || ''}</span><span class="en">${item.en}</span>
      ${exHtml ? `<details style="margin-top:10px"><summary style="cursor:pointer; font-size:14px; color:var(--shu)">Examples</summary>${exHtml}</details>` : ''}
    `;
    listEl.appendChild(card);
  });
}

document.getElementById('posChips').addEventListener('click', e => {
  if (e.target.classList.contains('chip')) {
    document.querySelectorAll('.chip').forEach(c => c.classList.remove('active'));
    e.target.classList.add('active');
    performSearch();
  }
});
document.getElementById('kw').addEventListener('input', performSearch);
initDictionary();
</script>
</body>
</html>
